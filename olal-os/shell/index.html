<script>
/* ===== rede neural real do Olal (MLP char-level, pesos em model.js) ===== */
const AI_SEEDS=[
  "a gente a entender melhor o mundo ","o sistema operacional cuida da tela ",
  "eu sou uma rede neural pequena que ","a tecnologia muda o mundo e nos ajuda ",
  "vamos conversar mais sobre o seu dia ","o computador e uma maquina que segue ",
  "a curiosidade move o ser humano a ","estudar um pouco a cada dia faz uma ",
  "a leitura abre portas para mundos novos ","um amigo de verdade escuta e apoia ",
  "respira fundo vai dar tudo certo um ","ajudar o proximo deixa o mundo um lugar ",
  "acredite mais no seu potencial voce e ","a vida e feita de pequenos momentos que "];
function aiIdx(c){ const i=M.VOCAB.indexOf((c||" ").toLowerCase()); return i<0?0:i; }
function aiForward(ctx){
  const ce=M.CTX*M.EMB, e=new Float32Array(ce);
  for(let j=0;j<M.CTX;j++) for(let k=0;k<M.EMB;k++) e[j*M.EMB+k]=M.EMBW[ctx[j]*M.EMB+k];
  const h=new Float32Array(M.HID);
  for(let i=0;i<M.HID;i++){ let s=M.B1[i]; for(let n=0;n<ce;n++) s+=e[n]*M.W1[n*M.HID+i]; h[i]=Math.tanh(s); }
  const lo=new Float32Array(M.V);
  for(let o=0;o<M.V;o++){ let s=M.B2[o]; for(let i=0;i<M.HID;i++) s+=h[i]*M.W2[i*M.V+o]; lo[o]=s; }
  return lo;
}
function aiGenerate(prompt,maxlen=150){
  if(typeof M==="undefined") return "(modelo nao carregou)";
  let hsh=0; for(let i=0;i<prompt.length;i++) hsh=(hsh*31+prompt.charCodeAt(i))>>>0;
  const seed=AI_SEEDS[(hsh+(Math.random()*1e9|0))%AI_SEEDS.length];
  const ctx=[]; for(let i=0;i<M.CTX;i++){ const p=seed.length-M.CTX+i; ctx.push(aiIdx(p>=0?seed[p]:" ")); }
  let out="",temp=0.5;
  for(let n=0;n<maxlen;n++){
    const lo=aiForward(ctx); let mx=lo[0];
    for(let i=1;i<M.V;i++) if(lo[i]>mx) mx=lo[i];
    let sum=0; const ps=new Float32Array(M.V);
    for(let i=0;i<M.V;i++){ ps[i]=Math.exp((lo[i]-mx)/temp); sum+=ps[i]; }
    let r=Math.random()*sum, pick=M.V-1;
    for(let i=0;i<M.V;i++){ r-=ps[i]; if(r<=0){ pick=i; break; } }
    const c=M.VOCAB[pick]; out+=c;
    for(let i=0;i<M.CTX-1;i++) ctx[i]=ctx[i+1]; ctx[M.CTX-1]=pick;
    if((c==="."||c==="?")&&n>24) break;
  }
  return out.trim();
}

/* ----- YouTube REAL: busca de verdade + player por ID (toca de verdade) -----
   O embed por listType=search foi descontinuado pelo YouTube; entao buscamos
   os resultados reais (via r.jina.ai) e tocamos pelo ID, que e confiavel. */
function appYT(b){
  b.innerHTML=`<div style="padding:10px;display:flex;gap:8px">
      <input class="field" id="ytq" placeholder="pesquisar no YouTube..." value="lofi hip hop">
      <button class="btn r" id="ytgo">Buscar</button></div>
    <div id="ytplayer"></div>
    <div id="ytlist" style="overflow:auto"></div>`;
  const list=b.querySelector("#ytlist"), player=b.querySelector("#ytplayer"), q=b.querySelector("#ytq");
  function play(id){
    player.innerHTML=`<iframe style="width:100%;height:230px;background:#000"
      allow="autoplay; encrypted-media; fullscreen" allowfullscreen
      src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0"></iframe>`;
  }
  async function search(){
    const term=q.value.trim(); if(!term) return;
    player.innerHTML=""; list.innerHTML='<div style="padding:20px;color:#94a3b8">buscando...</div>';
    try{
      const r=await fetch("https://r.jina.ai/https://www.youtube.com/results?search_query="+encodeURIComponent(term));
      const t=await r.text();
      const seen=new Set(), items=[]; const re=/\[([^\]]{4,90})\]\([^)]*watch\?v=([\w-]{11})/g; let m;
      while((m=re.exec(t)) && items.length<25){
        const title=m[1].trim(), id=m[2];
        if(seen.has(id)) continue; seen.add(id);
        if(/^(mix|https?|www\.|\d+:\d+|)/i.test(title)||title.length<4) continue;
        items.push({title,id});
      }
      if(!items.length){ list.innerHTML='<div style="padding:20px;color:#ef4444">nada encontrado (sem internet?)</div>'; return; }
      list.innerHTML=items.map(v=>
        `<div class="ytrow" data-id="${v.id}" style="display:flex;gap:10px;align-items:flex-start;padding:10px;border-bottom:1px solid #1e293b;cursor:pointer">
          <img loading="lazy" src="https://i.ytimg.com/vi/${v.id}/mqdefault.jpg"
            style="width:130px;height:73px;border-radius:8px;object-fit:cover;background:#222;flex:0 0 auto">
          <div style="font-size:14px;line-height:1.35">${v.title}</div></div>`).join("");
      list.querySelectorAll(".ytrow").forEach(row=>row.onclick=()=>{ play(row.dataset.id);
        player.scrollIntoView({block:"start"}); });
      player.innerHTML='<div style="padding:14px;color:#94a3b8;text-align:center">toque num video para tocar</div>';
    }catch(e){ list.innerHTML='<div style="padding:20px;color:#ef4444">erro: '+e.message+'</div>'; }
  }
  b.querySelector("#ytgo").onclick=search;
  q.addEventListener("keydown",e=>{ if(e.key==="Enter") search(); });
  search();
}

/* ----- Calculadora ----- */
function appCalc(b){
  b.innerHTML=`<div class="pad"><div id="disp" style="text-align:right;font-size:40px;
    background:#1E293B;border-radius:14px;padding:18px;margin-bottom:14px;min-height:30px">0</div>
    <div id="keys" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px"></div></div>`;
  let acc=0,cur="0",op=null,fresh=true;
  const disp=()=>document.getElementById("disp").textContent=cur;
  const K="7 8 9 / 4 5 6 * 1 2 3 - C 0 = +".split(" ");
  const kd=document.getElementById("keys");
  K.forEach(k=>{ const btn=document.createElement("button"); btn.className="btn s"; btn.textContent=k;
    btn.style.height="62px"; btn.style.fontSize="22px";
    if("+-*/".includes(k)) btn.style.background="#2563EB";
    if(k==="=") btn.style.background="#2BD17A"; if(k==="C") btn.style.background="#DC2626";
    btn.onclick=()=>{
      if(/[0-9]/.test(k)){ cur=(fresh||cur==="0")?k:cur+k; fresh=false; }
      else if(k==="C"){ acc=0;cur="0";op=null;fresh=true; }
      else if(k==="="){ if(op){ cur=String(calc(acc,op,parseFloat(cur))); op=null; fresh=true; } }
      else { if(op) acc=calc(acc,op,parseFloat(cur)); else acc=parseFloat(cur); op=k; fresh=true; }
      disp(); };
    kd.appendChild(btn); });
  function calc(a,o,b){ return o==="+"?a+b:o==="-"?a-b:o==="*"?a*b:o==="/"?(b?a/b:0):b; }
}

/* ----- OLA-32 (nossa CPU, emulador em JS) ----- */
function appOla32(b){
  const code=["li r1,0","li r2,1","li r3,12","loop:","sys r1,2","add r6,r1,r2",
    "add r1,r0,r2","add r2,r0,r6","addi r4,r4,1","bne r4,r3,loop","hlt"];
  const out=runOla32(code);
  b.innerHTML=`<div class="pad">
    <div style="color:#c4b5fd">Arquitetura criada do zero (16 regs, RISC 32-bit)</div>
    <div style="background:#140c24;border-radius:10px;padding:12px;margin:12px 0">
      <div style="color:#94a3b8">rodando na nossa CPU:</div>
      <div style="color:#6ee7b7;font-size:22px;font-weight:700">${out}</div></div>
    <pre style="background:#140c24;border-radius:10px;padding:12px;color:#cbd5e1;font-size:13px">${code.join("\n")}</pre>
    <div style="color:#94a3b8;font-size:13px">CPU, montador e emulador 100% nossos (arch/).</div></div>`;
}
function runOla32(prog){
  const R=new Array(16).fill(0); const labels={}; const ins=[];
  prog.forEach(l=>{ l=l.trim(); if(!l)return; if(l.endsWith(":")){labels[l.slice(0,-1)]=ins.length;return;} ins.push(l); });
  let out=[],pc=0,guard=0;
  const reg=s=>parseInt(s.replace("r",""));
  while(pc<ins.length && guard++<10000){
    const p=ins[pc].split(/[ ,]+/); const op=p[0]; pc++;
    if(op==="li") R[reg(p[1])]=parseInt(p[2]);
    else if(op==="add") R[reg(p[1])]=R[reg(p[2])]+R[reg(p[3])];
    else if(op==="addi") R[reg(p[1])]=R[reg(p[2])]+parseInt(p[3]);
    else if(op==="sys") out.push(R[reg(p[1])]);
    else if(op==="bne"){ if(R[reg(p[1])]!==R[reg(p[2])]) pc=labels[p[3]]; }
    else if(op==="hlt") break;
  }
  return out.join(" ");
}

/* ----- Paint ----- */
function appPaint(b){
  b.innerHTML=`<canvas id="cv" style="width:100%;height:calc(100% - 60px);background:#fff;touch-action:none"></canvas>
    <div style="display:flex;gap:8px;padding:10px" id="pal"></div>`;
  const cv=b.querySelector("#cv"); const ctx=cv.getContext("2d");
  setTimeout(()=>{ cv.width=cv.clientWidth; cv.height=cv.clientHeight; },50);
  let col="#EF4444",down=false;
  ["#EF4444","#22C55E","#3B82F6","#EAB308","#111827","#fff"].forEach(c=>{
    const d=document.createElement("button"); d.className="btn"; d.style.background=c; d.style.width="42px"; d.style.height="42px";
    d.onclick=()=>col=c; b.querySelector("#pal").appendChild(d); });
  const pos=e=>{ const r=cv.getBoundingClientRect(); const t=e.touches?e.touches[0]:e;
    return {x:t.clientX-r.left,y:t.clientY-r.top}; };
  const start=e=>{down=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault();};
  const move=e=>{ if(!down)return;const p=pos(e);ctx.strokeStyle=col;ctx.lineWidth=6;ctx.lineCap="round";
    ctx.lineTo(p.x,p.y);ctx.stroke();e.preventDefault();};
  const end=()=>down=false;
  cv.addEventListener("mousedown",start);cv.addEventListener("mousemove",move);cv.addEventListener("mouseup",end);
  cv.addEventListener("touchstart",start);cv.addEventListener("touchmove",move);cv.addEventListener("touchend",end);
}

/* ----- Olal AI: a NOSSA rede neural (MLP char-level) rodando em JS ----- */
function appAI(b){
  b.innerHTML=`<div class="pad" style="height:100%;display:flex;flex-direction:column;gap:10px">
    <div id="chat" style="flex:1;overflow:auto;background:#0a1a14;border-radius:10px;padding:12px;color:#d1fae5;line-height:1.5">
      Oi! Eu sou a <b>Olal AI</b>, uma rede neural (MLP char-level) que roda
      aqui dentro - os mesmos pesos do nosso kernel. Fale comigo:<br><br></div>
    <div style="display:flex;gap:8px"><input class="field" id="aiq" placeholder="diga algo...">
    <button class="btn g" id="ais">&gt;</button></div></div>`;
  const chat=b.querySelector("#chat"),q=b.querySelector("#aiq");
  const send=()=>{ const t=q.value.trim(); if(!t)return; q.value="";
    chat.innerHTML+=`<b>voce:</b> ${t}<br><b style="color:#2BD17A">olal:</b> <i>pensando...</i><br><br>`;
    chat.scrollTop=chat.scrollHeight;
    setTimeout(()=>{ const r=aiGenerate(t);
      chat.lastChild; chat.innerHTML=chat.innerHTML.replace("<i>pensando...</i>", r||"...");
      chat.scrollTop=chat.scrollHeight; }, 30); };
  b.querySelector("#ais").onclick=send; q.onkeydown=e=>{if(e.key==="Enter")send();};
}

function appNet(b){
  b.innerHTML=`<div class="pad"><div style="background:#0e1a2a;border-radius:12px;padding:16px;line-height:2">
    <div>Status: <b style="color:#2BD17A">${navigator.onLine?"conectado":"offline"}</b></div>
    <div>Tipo: <b>${(navigator.connection&&navigator.connection.effectiveType)||"?"}</b></div>
    <div>User agent:</div><div style="font-size:12px;color:#94a3b8">${navigator.userAgent}</div></div></div>`;
}
function appFiles(b){
  const f=[["notas.txt","1 KB"],["sistema/","-"],["olal.ai","98 KB"],["wallpaper.raw","1.5 MB"],["readme.md","2 KB"]];
  b.innerHTML=`<div class="pad">`+f.map(x=>
    `<div style="display:flex;align-items:center;gap:12px;background:#1E293B;border-radius:12px;padding:14px;margin-bottom:10px">
      <div style="width:40px;height:40px;border-radius:8px;background:#2563EB;display:flex;align-items:center;justify-content:center;font-weight:700">F</div>
      <div><div>${x[0]}</div><div style="color:#94a3b8;font-size:12px">${x[1]}</div></div></div>`).join("")+`</div>`;
}
</script>

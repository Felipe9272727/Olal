<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="icon" href="data:,">
<title>Olal OS</title>
<style>
  :root{ --bg1:#16233D; --bg2:#0A0E16; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; overflow:hidden; background:#05070c;
    font-family:system-ui,Segoe UI,Roboto,sans-serif; color:#e5e7eb; touch-action:manipulation; }
  #screen{ position:fixed; inset:0; display:flex; flex-direction:column;
    background:linear-gradient(160deg,var(--bg1),var(--bg2)); }
  /* barra de status */
  #status{ height:34px; display:flex; align-items:center; justify-content:space-between;
    padding:0 16px; font-size:14px; background:#0b1220cc; }
  #status .olal{ color:#2BD17A; font-weight:700; letter-spacing:1px; }
  /* home */
  #home{ flex:1; overflow-y:auto; padding:14px 12px 28px; }
  #greet{ text-align:center; font-size:30px; font-weight:700; margin:14px 0 14px; color:#f1f5f9; }
  #aihome{ display:flex; align-items:center; gap:10px; margin:0 4px 18px; padding:13px 16px;
    border-radius:16px; background:linear-gradient(135deg,#13352a,#0e2536);
    border:1px solid #2BD17A55; }
  #aihome .d{ font-size:22px; } #aihome .p{ color:#9fb3c8; font-size:15px; }
  #grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px 8px; }
  .app{ display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer; }
  .ico{ width:62px; height:62px; border-radius:18px; display:flex; align-items:center;
    justify-content:center; font-weight:800; font-size:22px; color:#fff;
    box-shadow:0 6px 14px #0006; }
  .app .lbl{ font-size:12px; color:#cbd5e1; }
  .app:active .ico{ transform:scale(.92); }
  /* tela de app */
  #view{ position:absolute; inset:0; display:none; flex-direction:column; background:#0A0E16; }
  #view.on{ display:flex; }
  #bar{ height:50px; flex:0 0 auto; display:flex; align-items:center; gap:10px; padding:0 10px;
    background:#0b1220; }
  #bar button.back{ width:54px; height:34px; border:0; border-radius:8px; background:#1E293B;
    color:#2BD17A; font-size:18px; font-weight:700; }
  #bar .title{ font-size:18px; font-weight:600; color:#f1f5f9; }
  #body{ flex:1; overflow:auto; position:relative; }
  /* widgets reutilizaveis */
  .pad{ padding:16px; }
  .btn{ border:0; border-radius:12px; padding:12px 16px; font-size:16px; font-weight:600;
    color:#fff; background:#2563EB; }
  .btn.g{ background:#2BD17A; color:#06281a; } .btn.r{ background:#DC2626; } .btn.s{ background:#374151; }
  input,textarea{ font-family:inherit; }
  .field{ width:100%; padding:12px; border-radius:10px; border:1px solid #334155;
    background:#111827; color:#e5e7eb; font-size:16px; }
  iframe{ border:0; width:100%; height:100%; background:#fff; }
  /* assistente de IA (cerebro do sistema) */
  #aibtn{ position:fixed; right:16px; bottom:18px; width:58px; height:58px; border-radius:50%;
    background:linear-gradient(135deg,#2BD17A,#0EA5E9); display:flex; align-items:center;
    justify-content:center; font-size:26px; box-shadow:0 6px 18px #0008; z-index:50; cursor:pointer; }
  #aibtn:active{ transform:scale(.9); }
  #aiover{ position:fixed; inset:0; z-index:60; background:#070b12f2; display:none; flex-direction:column; }
  #aiover.on{ display:flex; }
  #aihead{ display:flex; align-items:center; gap:10px; padding:14px 16px; background:#0b1220; }
  #aihead .dot{ width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#2BD17A,#0EA5E9);
    display:flex;align-items:center;justify-content:center;font-size:16px; }
  #aihead .t{ font-weight:700; font-size:17px; flex:1; }
  #aihead .x{ font-size:22px; color:#94a3b8; padding:4px 10px; }
  #aichat{ flex:1; overflow:auto; padding:14px; display:flex; flex-direction:column; gap:10px; }
  .msg{ max-width:84%; padding:10px 13px; border-radius:14px; line-height:1.45; white-space:pre-wrap; }
  .msg.u{ align-self:flex-end; background:#2563EB; color:#fff; border-bottom-right-radius:4px; }
  .msg.a{ align-self:flex-start; background:#1e293b; color:#e5e7eb; border-bottom-left-radius:4px; }
  #aiin{ display:flex; gap:8px; padding:10px; background:#0b1220; }
</style>
</head>
<body>
<div id="screen">
  <div id="status"><span class="olal">olal</span><span id="clock">--:--</span></div>
  <div id="home">
    <div id="greet">Bom dia</div>
    <div id="aihome" onclick="aiOpen()">
      <span class="d">🤖</span><span class="p">Pergunte qualquer coisa à Olal AI…</span>
    </div>
    <div id="grid"></div>
  </div>
  <div id="view">
    <div id="bar"><button class="back" onclick="closeApp()">&lt;</button><span class="title" id="vtitle"></span></div>
    <div id="body"></div>
  </div>

  <!-- assistente de IA: o cerebro do sistema, acessivel de qualquer tela -->
  <div id="aibtn" onclick="aiOpen()">🤖</div>
  <div id="aiover">
    <div id="aihead"><span class="dot">🤖</span><span class="t">Olal AI</span>
      <span class="x" onclick="aiClose()">✕</span></div>
    <div id="aichat"></div>
    <div id="aiin"><input class="field" id="aimsg" placeholder="peça qualquer coisa ao Olal...">
      <button class="btn g" id="aisend">➤</button></div>
  </div>
</div>

<script>
/* ============================================================
   OLAL AI - o cerebro do sistema. Uma LLM de verdade (sem chave,
   via Pollinations) que conversa E CONTROLA a OS inteira.
   ============================================================ */
const AI_SYS =
`Voce e a Olal AI, a inteligencia que comanda o Olal OS - um sistema operacional 100% movido por IA, feito no celular. Fale em portugues, de forma amigavel, curta e util.
Voce CONTROLA o sistema. Quando o usuario pedir para abrir um app, tocar musica/video, pesquisar ou navegar, responda em 1 frase curta e ADICIONE no final UMA linha exatamente assim:
@@ACT {"app":"NOME","query":"..."}
Apps validos: youtube (query=o que tocar), navegador (query=site ou termo), calc, notas, terminal, relogio, paint, ola32, sistema, rede, config, arquivos, js.
Exemplos:
toca lofi -> @@ACT {"app":"youtube","query":"lofi hip hop"}
abre a wikipedia dos gatos -> @@ACT {"app":"navegador","query":"https://pt.wikipedia.org/wiki/Gato"}
abre a calculadora -> @@ACT {"app":"calc"}
Se for so conversa, NAO inclua @@ACT.`;

async function aiAsk(history){
  // monta um prompt compacto (system + ultimas trocas)
  const turns = history.slice(-6).map(m=>(m.role==="user"?"Usuario":"Olal")+": "+m.content).join("\n");
  const prompt = AI_SYS + "\n\n" + turns + "\nOlal:";
  const url = "https://text.pollinations.ai/" + encodeURIComponent(prompt) + "?model=openai";
  const r = await fetch(url);
  if(!r.ok) throw new Error("status "+r.status);
  return (await r.text()).trim();
}

const APP_IDX = {ai:0,terminal:1,calc:2,notas:3,relogio:4,config:5,arquivos:6,paint:7,ola32:8,sistema:9,rede:10,navegador:11,js:12,youtube:13};
/* executa a acao que a IA decidiu e devolve o texto limpo (sem @@ACT) */
function aiHandle(resp){
  let text = resp, act = null;
  const m = resp.match(/@@ACT\s*(\{[\s\S]*\})/);
  if(m){ text = resp.slice(0, m.index).trim(); try{ act = JSON.parse(m[1]); }catch(e){} }
  if(act && act.app && APP_IDX[act.app]!==undefined){
    openApp(APP_IDX[act.app]);
    if(act.query){ setTimeout(()=>{
      if(act.app==="youtube"){ const q=document.getElementById("ytq"); if(q){ q.value=act.query; document.getElementById("ytgo").click(); } }
      else if(act.app==="navegador"){ const u=document.getElementById("bu"); if(u){ u.value=act.query;
        (act.query.includes(".")?document.getElementById("bgo"):document.getElementById("brd")).click(); } }
    },350); }
  }
  return text || "feito!";
}

/* ===== ponte com o SISTEMA REAL (backend Olal) - faz o Olal ser um OS ===== */
const SYS_API = location.origin;
let SYS_OK = false;
async function sysExec(cmd,cwd){ const r=await fetch(SYS_API+"/api/exec",{method:"POST",
  headers:{"Content-Type":"application/json"},body:JSON.stringify({cmd,cwd})}); return r.json(); }
async function sysLs(path){ const r=await fetch(SYS_API+"/api/ls?path="+encodeURIComponent(path||"")); return r.json(); }
async function sysInfo(){ const r=await fetch(SYS_API+"/api/sysinfo"); return r.json(); }
fetch(SYS_API+"/api/sysinfo").then(r=>r.ok&&(SYS_OK=true)).catch(()=>{});

/* ===== mesma lista/cores dos apps do nosso OS ===== */
const APPS = [
  {n:"Olal AI", c:"#2BD17A", i:"AI", f:appAI},
  {n:"Terminal", c:"#3B82F6", i:">_", f:appTerm},
  {n:"Calc", c:"#F59E0B", i:"=", f:appCalc},
  {n:"Notas", c:"#A855F7", i:"N", f:appNotes},
  {n:"Relogio", c:"#22C3DD", i:"O", f:appClock},
  {n:"Config", c:"#94A3B8", i:"%", f:appConfig},
  {n:"Arquivos", c:"#EAB308", i:"F", f:appFiles},
  {n:"Paint", c:"#EF4444", i:"P", f:appPaint},
  {n:"OLA-32", c:"#8B5CF6", i:"C", f:appOla32},
  {n:"Sistema", c:"#10B981", i:"S", f:appSys},
  {n:"Rede", c:"#0EA5E9", i:"@", f:appNet},
  {n:"Navegador", c:"#F97316", i:"W", f:appBrowser},
  {n:"Olal JS", c:"#FACC15", i:"JS", f:appJS},
  {n:"YouTube", c:"#FF0000", i:"YT", f:appYT},
];

/* auto-ajuste de proporcao: se a tela estiver larga (desktop/Chromium sem o
   pref), escala a interface pra ficar com proporcao de celular */
(function olalFit(){
  function apply(){ const target=440;
    if(window.innerWidth>560){ document.documentElement.style.zoom=(window.innerWidth/target).toFixed(3); }
    else { document.documentElement.style.zoom=""; } }
  window.addEventListener("resize",apply); apply();
})();

const grid=document.getElementById("grid");
APPS.forEach((a,idx)=>{
  const el=document.createElement("div"); el.className="app";
  el.innerHTML=`<div class="ico" style="background:${a.c}">${a.i}</div><div class="lbl">${a.n}</div>`;
  el.onclick=()=>openApp(idx); grid.appendChild(el);
});

const view=document.getElementById("view"), body=document.getElementById("body"), vtitle=document.getElementById("vtitle");
function openApp(i){ vtitle.textContent=APPS[i].n; body.innerHTML=""; view.classList.add("on"); APPS[i].f(body); }
function closeApp(){ view.classList.remove("on"); body.innerHTML=""; }

/* relogio + saudacao */
function tick(){
  const d=new Date(); const hh=String(d.getHours()).padStart(2,"0"), mm=String(d.getMinutes()).padStart(2,"0");
  document.getElementById("clock").textContent=hh+":"+mm;
  const h=d.getHours(); document.getElementById("greet").textContent =
    h<12?"Bom dia":h<18?"Boa tarde":"Boa noite";
}
setInterval(tick,1000); tick();

/* ===== assistente de IA global (o cerebro do sistema) ===== */
let aiHist=[];
const aiChat=document.getElementById("aichat");
function aiBubble(role,txt){ const d=document.createElement("div");
  d.className="msg "+(role==="user"?"u":"a"); d.textContent=txt; aiChat.appendChild(d);
  aiChat.scrollTop=aiChat.scrollHeight; return d; }
let aiWelcomed=false;
function aiOpen(prefill){ document.getElementById("aiover").classList.add("on");
  if(!aiWelcomed){ aiWelcomed=true; aiBubble("a","Oi! Eu sou a Olal AI e comando este sistema. Posso conversar e tambem CONTROLAR a OS: peca 'toca lofi no youtube', 'abre a calculadora', 'pesquisa gatos'..."); }
  if(prefill){ document.getElementById("aimsg").value=prefill; aiSend(); }
  else document.getElementById("aimsg").focus(); }
function aiClose(){ document.getElementById("aiover").classList.remove("on"); }
/* parser LOCAL de comandos: a IA controla a OS sem depender da internet */
function ytGo(q){ openApp(APP_IDX.youtube); setTimeout(()=>{const e=document.getElementById("ytq");
  if(e){ e.value=q; document.getElementById("ytgo").click(); }},350); }
function navGo(u){ openApp(APP_IDX.navegador); setTimeout(()=>{const e=document.getElementById("bu");
  if(e){ e.value=u; (u.includes(".")?document.getElementById("bgo"):document.getElementById("brd")).click(); }},350); }
const APP_KW={calc:["calculadora","calc"],notas:["notas","nota","bloco de notas"],terminal:["terminal","console"],
  relogio:["relogio","relógio"],paint:["paint","pintura","desenho"],ola32:["ola-32","ola32"],sistema:["sistema"],
  rede:["rede"],config:["config","configura"],arquivos:["arquivos","arquivo"],js:["olal js","javascript"],
  navegador:["navegador"],youtube:["youtube"],ai:["assistente","olal ai"]};
function localIntent(text){
  const t=" "+text.toLowerCase().trim()+" "; let m;
  if(/que horas|hora agora|horas s[ãa]o/.test(t)) return "Agora são "+new Date().toLocaleTimeString()+" ⏰";
  if((m=t.match(/quanto (?:e|é|da|dá|vale)\s+([0-9+\-*/.,() ]+)/))){ try{
      const r=Function('"use strict";return('+m[1].replace(/,/g,".")+')')(); if(isFinite(r)) return m[1].trim()+" = "+r; }catch(e){} }
  if((m=t.match(/\b(?:toc[ae]r?|play|p[õo]e|poe|coloca|reproduz(?:ir)?)\s+(.+?)\s*$/))){
    const q=m[1].replace(/\s+no\s+youtube\s*$/,"").trim(); if(q){ ytGo(q); return 'tocando "'+q+'" no YouTube 🎵'; } }
  if((m=t.match(/\b(?:pesquis[ae]r?|busc[ae]r?|procur[ae]r?)\s+(.+?)\s+no\s+youtube\b/))){
    ytGo(m[1].trim()); return 'buscando "'+m[1].trim()+'" no YouTube'; }
  if((m=t.match(/\b(?:abr[ae]?|abrir|abre o|abre a|vai (?:pro|para)|entra n[ao]|me leva (?:pro|para))\s+(.+?)\s*$/))){
    const what=m[1].trim();
    for(const [app,kw] of Object.entries(APP_KW)) if(kw.some(k=>what.includes(k))){ openApp(APP_IDX[app]); return "abrindo "+app+" ✅"; }
    if(/\S+\.\S+/.test(what)){ navGo(what); return "abrindo "+what; } }
  if((m=t.match(/\b(?:naveg(?:ar|a)?(?: para| pro)?|v[aá] (?:para|pro)|acessa(?:r)?|entra n[ao])\s+(\S+\.\S+)/))){
    navGo(m[1]); return "abrindo "+m[1]; }
  return null;
}
async function aiSend(){
  const inp=document.getElementById("aimsg"); const t=inp.value.trim(); if(!t) return; inp.value="";
  aiBubble("user",t); aiHist.push({role:"user",content:t});
  // a IA executa comandos REAIS do sistema (Olal OS): "rode X", "$ X", "instala X"
  let cm = t.match(/^\s*(?:rode|roda|executa|execute|rodar|comando)\s+(.+)/i);
  if(!cm && t.startsWith("$")) cm=[0,t.slice(1).trim()];
  if(!cm){ const ins=t.match(/^\s*instal[ae]r?\s+(.+)/i); if(ins) cm=[0,"apt-get install -y "+ins[1]]; }
  if(SYS_OK && cm){ const bb=aiBubble("a","executando…");
    try{ const r=await sysExec(cm[1]); bb.textContent="$ "+cm[1]+"\n"+((r.out||"(sem saída)").slice(0,2500)); }
    catch(e){ bb.textContent="erro: "+e.message; }
    aiHist.push({role:"assistant",content:"(comando executado)"}); aiChat.scrollTop=aiChat.scrollHeight; return; }
  const local=localIntent(t);
  if(local){ aiBubble("a",local); aiHist.push({role:"assistant",content:local}); return; }
  const b=aiBubble("a","…");
  try{ const resp=await aiAsk(aiHist); const clean=aiHandle(resp);
       b.textContent=clean; aiHist.push({role:"assistant",content:clean}); }
  catch(e){ b.textContent="A IA online não respondeu (sua rede/VPN pode estar bloqueando — tente DESLIGAR a VPN). Mesmo assim eu controlo o sistema: \"abre a calculadora\", \"toca lofi\", \"rode ls -la\", \"que horas são\"."; }
  aiChat.scrollTop=aiChat.scrollHeight;
}
document.getElementById("aisend").onclick=aiSend;
document.getElementById("aimsg").addEventListener("keydown",e=>{ if(e.key==="Enter") aiSend(); });

/* ============================ APPS ============================ */

/* ----- YouTube REAL: busca de verdade + player por ID (toca de verdade) -----
   O embed por listType=search foi descontinuado pelo YouTube; entao buscamos
   os resultados reais (via r.jina.ai) e tocamos pelo ID, que e confiavel. */
async function ytSearch(term){
  const insts=["api.piped.private.coffee","pipedapi.leptons.xyz","pipedapi.r4fo.com","pipedapi.adminforge.de","pipedapi.kavin.rocks"];
  for(const h of insts){
    try{ const r=await fetch("https://"+h+"/search?q="+encodeURIComponent(term)+"&filter=videos");
      if(!r.ok) continue; const j=await r.json(); const arr=j.items||j; if(!arr||!arr.length) continue;
      const items=[], seen=new Set();
      for(const v of arr){ const mm=(v.url||"").match(/v=([\w-]{11})/); if(!mm||seen.has(mm[1]))continue;
        seen.add(mm[1]); items.push({title:(v.title||"video").trim(),id:mm[1]}); if(items.length>=25)break; }
      if(items.length) return items;
    }catch(e){}
  }
  try{ const r=await fetch("https://r.jina.ai/https://www.youtube.com/results?search_query="+encodeURIComponent(term));
    const t=await r.text(); const seen=new Set(), items=[];
    const re=/\[([^\]]{4,90})\]\([^)]*watch\?v=([\w-]{11})/g; let m;
    while((m=re.exec(t)) && items.length<25){ const ti=m[1].trim(), id=m[2];
      if(seen.has(id)||/^(mix|https?|www\.)/i.test(ti)||ti.length<4)continue; seen.add(id); items.push({title:ti,id}); }
    return items;
  }catch(e){ return []; }
}
function appYT(b){
  b.innerHTML=`<div style="padding:10px;display:flex;gap:8px">
      <input class="field" id="ytq" placeholder="pesquisar no YouTube..." value="lofi hip hop">
      <button class="btn r" id="ytgo">Buscar</button></div>
    <div id="ytplayer"></div>
    <div id="ytlist" style="overflow:auto"></div>`;
  const list=b.querySelector("#ytlist"), player=b.querySelector("#ytplayer"), q=b.querySelector("#ytq");
  function play(id){
    player.innerHTML=`<iframe style="width:100%;height:230px;background:#000"
      allow="autoplay; encrypted-media; fullscreen" allowfullscreen
      src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0"></iframe>`;
  }
  async function search(){
    const term=q.value.trim(); if(!term) return;
    player.innerHTML=""; list.innerHTML='<div style="padding:20px;color:#94a3b8">buscando...</div>';
    const items=await ytSearch(term);
    if(!items.length){ list.innerHTML='<div style="padding:20px;color:#ef4444">nada encontrado (rede instavel, tente de novo)</div>'; return; }
      list.innerHTML=items.map(v=>
        `<div class="ytrow" data-id="${v.id}" style="display:flex;gap:10px;align-items:flex-start;padding:10px;border-bottom:1px solid #1e293b;cursor:pointer">
          <img loading="lazy" src="https://i.ytimg.com/vi/${v.id}/mqdefault.jpg"
            style="width:130px;height:73px;border-radius:8px;object-fit:cover;background:#222;flex:0 0 auto">
          <div style="font-size:14px;line-height:1.35">${v.title}</div></div>`).join("");
      list.querySelectorAll(".ytrow").forEach(row=>row.onclick=()=>{ play(row.dataset.id);
        player.scrollIntoView({block:"start"}); });
    player.innerHTML='<div style="padding:14px;color:#94a3b8;text-align:center">toque num video para tocar</div>';
  }
  b.querySelector("#ytgo").onclick=search;
  q.addEventListener("keydown",e=>{ if(e.key==="Enter") search(); });
  search();
}

/* ----- Navegador REAL (Chromium de verdade) + modo Leitura de fallback ----- */
function appBrowser(b){
  b.innerHTML=`<div style="padding:10px;display:flex;gap:6px">
      <input class="field" id="bu" placeholder="site ou busca" value="wikipedia.org">
      <button class="btn" id="bgo">Ir</button>
      <button class="btn s" id="brd" title="modo leitura">Aa</button></div>
    <div id="bwrap" style="height:calc(100% - 64px);position:relative"></div>`;
  const iframeUrl=()=>{ let u=b.querySelector("#bu").value.trim();
    if(!u||!u.includes(".")) return null; return u.startsWith("http")?u:"https://"+u; };
  const go=()=>{ const u=iframeUrl();
    if(!u){ read(); return; }   /* termo de busca -> modo leitura (iframe de busca e bloqueado) */
    b.querySelector("#bwrap").innerHTML=
      `<iframe src="${u}"></iframe>
       <div style="position:absolute;bottom:6px;right:8px;font-size:11px;color:#64748b;background:#000a;padding:2px 6px;border-radius:6px">
       nao abriu? toque em "Aa" (leitura)</div>`; };
  const read=async()=>{ let raw=b.querySelector("#bu").value.trim(); if(!raw) return;
    const u = raw.includes(".") ? (raw.startsWith("http")?raw:"https://"+raw)
            : "https://html.duckduckgo.com/html/?q="+encodeURIComponent(raw);
    const w=b.querySelector("#bwrap");
    w.innerHTML='<div style="padding:16px;color:#94a3b8">lendo...</div>';
    try{ const r=await fetch("https://r.jina.ai/"+u); let t=await r.text();
      t=t.replace(/^[\s\S]*?Markdown Content:\s*/,"");
      t=t.replace(/!\[[^\]]*\]\([^)]*\)/g,"").replace(/\[([^\]]+)\]\([^)]*\)/g,"$1").replace(/[*#`>|]/g,"");
      w.innerHTML=`<div style="padding:16px;overflow:auto;height:100%;white-space:pre-wrap;line-height:1.5;color:#e5e7eb">`+
        t.slice(0,20000).replace(/&/g,"&amp;").replace(/</g,"&lt;")+`</div>`;
    }catch(e){ w.innerHTML='<div style="padding:16px;color:#ef4444">erro: '+e.message+'</div>'; } };
  b.querySelector("#bgo").onclick=go; b.querySelector("#brd").onclick=read; go();
}

/* ----- Calculadora ----- */
function appCalc(b){
  b.innerHTML=`<div class="pad"><div id="disp" style="text-align:right;font-size:40px;
    background:#1E293B;border-radius:14px;padding:18px;margin-bottom:14px;min-height:30px">0</div>
    <div id="keys" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px"></div></div>`;
  let acc=0,cur="0",op=null,fresh=true;
  const disp=()=>document.getElementById("disp").textContent=cur;
  const K="7 8 9 / 4 5 6 * 1 2 3 - C 0 = +".split(" ");
  const kd=document.getElementById("keys");
  K.forEach(k=>{ const btn=document.createElement("button"); btn.className="btn s"; btn.textContent=k;
    btn.style.height="62px"; btn.style.fontSize="22px";
    if("+-*/".includes(k)) btn.style.background="#2563EB";
    if(k==="=") btn.style.background="#2BD17A"; if(k==="C") btn.style.background="#DC2626";
    btn.onclick=()=>{
      if(/[0-9]/.test(k)){ cur=(fresh||cur==="0")?k:cur+k; fresh=false; }
      else if(k==="C"){ acc=0;cur="0";op=null;fresh=true; }
      else if(k==="="){ if(op){ cur=String(calc(acc,op,parseFloat(cur))); op=null; fresh=true; } }
      else { if(op) acc=calc(acc,op,parseFloat(cur)); else acc=parseFloat(cur); op=k; fresh=true; }
      disp(); };
    kd.appendChild(btn); });
  function calc(a,o,b){ return o==="+"?a+b:o==="-"?a-b:o==="*"?a*b:o==="/"?(b?a/b:0):b; }
}

/* ----- Terminal REAL (bash do Debian por baixo, via backend) ----- */
function appTerm(b){
  b.innerHTML=`<div class="pad" style="height:100%;display:flex;flex-direction:column">

    <input class="field" id="tin" placeholder="comando (bash real)..." autocapitalize="off" autocomplete="off"></div>`;
  const out=b.querySelector("#tout"), inp=b.querySelector("#tin");
  let cwd=null;
  out.textContent += SYS_OK ? "bash do sistema. ex: ls, pwd, uname -a, apt list\n\n" : "(modo local - sem backend)\n\n";
  inp.onkeydown=async e=>{ if(e.key!=="Enter") return; const c=inp.value.trim(); inp.value=""; if(!c) return;
    out.textContent+="olal$ "+c+"\n"; out.scrollTop=out.scrollHeight;
    if(c==="clear"){ out.textContent=""; return; }
    if(SYS_OK){
      try{ const r=await sysExec(c,cwd); out.textContent+=r.out;
           if(c.startsWith("cd ")){ const p=await sysExec("cd "+c.slice(3)+" && pwd",cwd); cwd=(p.out||"").trim()||cwd; }
      }catch(err){ out.textContent+="sem backend: "+err.message+"\n"; }
    } else {
      if(c==="help") out.textContent+="terminal real precisa do Olal OS instalado (backend).\n";
      else if(c==="date") out.textContent+=new Date().toString()+"\n";
      else if(c.startsWith("echo ")) out.textContent+=c.slice(5)+"\n";
      else out.textContent+="(no Olal OS instalado isto roda bash de verdade)\n";
    }
    out.scrollTop=out.scrollHeight; };
}

/* ----- OLA-32 (nossa CPU, emulador em JS) ----- */
function appOla32(b){
  const code=["li r1,0","li r2,1","li r3,12","loop:","sys r1,2","add r6,r1,r2",
    "add r1,r0,r2","add r2,r0,r6","addi r4,r4,1","bne r4,r3,loop","hlt"];
  const out=runOla32(code);
  b.innerHTML=`<div class="pad">
    <div style="color:#c4b5fd">Arquitetura criada do zero (16 regs, RISC 32-bit)</div>
    <div style="background:#140c24;border-radius:10px;padding:12px;margin:12px 0">
      <div style="color:#94a3b8">rodando na nossa CPU:</div>
      <div style="color:#6ee7b7;font-size:22px;font-weight:700">${out}</div></div>
    <pre style="background:#140c24;border-radius:10px;padding:12px;color:#cbd5e1;font-size:13px">${code.join("\n")}</pre>
    <div style="color:#94a3b8;font-size:13px">CPU, montador e emulador 100% nossos (arch/).</div></div>`;
}
function runOla32(prog){
  const R=new Array(16).fill(0); const labels={}; const ins=[];
  prog.forEach(l=>{ l=l.trim(); if(!l)return; if(l.endsWith(":")){labels[l.slice(0,-1)]=ins.length;return;} ins.push(l); });
  let out=[],pc=0,guard=0;
  const reg=s=>parseInt(s.replace("r",""));
  while(pc<ins.length && guard++<10000){
    const p=ins[pc].split(/[ ,]+/); const op=p[0]; pc++;
    if(op==="li") R[reg(p[1])]=parseInt(p[2]);
    else if(op==="add") R[reg(p[1])]=R[reg(p[2])]+R[reg(p[3])];
    else if(op==="addi") R[reg(p[1])]=R[reg(p[2])]+parseInt(p[3]);
    else if(op==="sys") out.push(R[reg(p[1])]);
    else if(op==="bne"){ if(R[reg(p[1])]!==R[reg(p[2])]) pc=labels[p[3]]; }
    else if(op==="hlt") break;
  }
  return out.join(" ");
}

/* ----- Paint ----- */
function appPaint(b){
  b.innerHTML=`<canvas id="cv" style="width:100%;height:calc(100% - 60px);background:#fff;touch-action:none"></canvas>
    <div style="display:flex;gap:8px;padding:10px" id="pal"></div>`;
  const cv=b.querySelector("#cv"); const ctx=cv.getContext("2d");
  setTimeout(()=>{ cv.width=cv.clientWidth; cv.height=cv.clientHeight; },50);
  let col="#EF4444",down=false;
  ["#EF4444","#22C55E","#3B82F6","#EAB308","#111827","#fff"].forEach(c=>{
    const d=document.createElement("button"); d.className="btn"; d.style.background=c; d.style.width="42px"; d.style.height="42px";
    d.onclick=()=>col=c; b.querySelector("#pal").appendChild(d); });
  const pos=e=>{ const r=cv.getBoundingClientRect(); const t=e.touches?e.touches[0]:e;
    return {x:t.clientX-r.left,y:t.clientY-r.top}; };
  const start=e=>{down=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault();};
  const move=e=>{ if(!down)return;const p=pos(e);ctx.strokeStyle=col;ctx.lineWidth=6;ctx.lineCap="round";
    ctx.lineTo(p.x,p.y);ctx.stroke();e.preventDefault();};
  const end=()=>down=false;
  cv.addEventListener("mousedown",start);cv.addEventListener("mousemove",move);cv.addEventListener("mouseup",end);
  cv.addEventListener("touchstart",start);cv.addEventListener("touchmove",move);cv.addEventListener("touchend",end);
}

/* ----- Arquivos REAIS (filesystem do Olal OS, via backend) ----- */
function appFiles(b){
  b.innerHTML=`<div class="pad" style="height:100%;display:flex;flex-direction:column">
    <div id="fpath" style="font-size:13px;color:#94a3b8;padding:4px 0 10px;word-break:break-all"></div>
    <div id="flist" style="flex:1;overflow:auto"></div></div>`;
  const fpath=b.querySelector("#fpath"), flist=b.querySelector("#flist");
  const fmtsz=n=>n>1048576?(n/1048576).toFixed(1)+" MB":n>1024?(n/1024).toFixed(0)+" KB":n+" B";
  function open(path){
    if(!SYS_OK){ flist.innerHTML='<div style="color:#94a3b8;padding:16px">Arquivos reais aparecem no Olal OS instalado.</div>'; fpath.textContent="(preview)"; return; }
    sysLs(path).then(d=>{ fpath.textContent="📁 "+d.path;
      let h="";
      if(d.parent && d.parent!==d.path) h+=row("..","dir",0,d.parent);
      for(const it of d.items) h+=row(it.name, it.dir?"dir":"file", it.size, (d.path.endsWith("/")?d.path:d.path+"/")+it.name);
      flist.innerHTML=h;
      flist.querySelectorAll("[data-p]").forEach(el=>el.onclick=()=>{ if(el.dataset.d==="1") open(el.dataset.p); });
    }).catch(()=>flist.innerHTML='<div style="color:#ef4444;padding:16px">erro ao ler</div>');
  }
  const row=(name,kind,size,full)=>
    `<div data-p="${full.replace(/"/g,'&quot;')}" data-d="${kind==='dir'?1:0}" style="display:flex;align-items:center;gap:12px;background:#1E293B;border-radius:10px;padding:11px;margin-bottom:7px;cursor:pointer">
      <div style="width:34px;height:34px;border-radius:8px;background:${kind==='dir'?'#EAB308':'#2563EB'};display:flex;align-items:center;justify-content:center;font-weight:700">${kind==='dir'?'📁':'📄'}</div>
      <div style="flex:1"><div>${name}</div><div style="color:#94a3b8;font-size:12px">${kind==='dir'?'pasta':fmtsz(size)}</div></div></div>`;
  open("");
}

<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="icon" href="data:,">
<title>Olal OS</title>
<style>
  :root{ --bg1:#16233D; --bg2:#070b14; --accent:#2BD17A; --accent2:#0EA5E9;
    --card:#16203a; --soft:#9fb3c8; --ease:cubic-bezier(.22,.61,.36,1); }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html,body{ margin:0; height:100%; overflow:hidden; background:#05070c;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; color:#e5e7eb;
    touch-action:manipulation; -webkit-font-smoothing:antialiased; }
  #screen{ position:fixed; top:0; left:0; display:flex; flex-direction:column; overflow:hidden;
    transform-origin:top left;
    background:radial-gradient(120% 80% at 50% -10%, #1b2c4d 0%, var(--bg1) 35%, var(--bg2) 100%); }

  /* ---- barra de status (topo) ---- */
  #status{ height:38px; flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
    padding:env(safe-area-inset-top,6px) 18px 0; font-size:14px; font-weight:600; }
  #status .olal{ color:var(--accent); font-weight:800; letter-spacing:1.5px; font-size:15px;
    text-shadow:0 0 12px #2bd17a55; }
  #status .right{ display:flex; gap:8px; align-items:center; color:#cbd5e1; }
  #status .dot{ width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); }

  /* ---- home ---- */
  #home{ flex:1; overflow-y:auto; overscroll-behavior:contain; -webkit-overflow-scrolling:touch;
    padding:8px 16px calc(28px + env(safe-area-inset-bottom,0px)); }
  #greet{ text-align:center; font-size:clamp(26px,8vw,34px); font-weight:800; margin:18px 0 16px;
    color:#f5f8fc; letter-spacing:.5px; }
  #aihome{ display:flex; align-items:center; gap:12px; margin:0 0 22px; padding:15px 18px;
    border-radius:20px; background:linear-gradient(135deg,#163a2d,#0e2740);
    border:1px solid #2BD17A40; box-shadow:0 8px 24px #0006, inset 0 1px 0 #ffffff10;
    transition:transform .15s var(--ease); }
  #aihome:active{ transform:scale(.97); }
  #aihome .d{ font-size:24px; filter:drop-shadow(0 0 6px #2bd17a88); }
  #aihome .p{ color:var(--soft); font-size:15px; }
  #grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:20px 6px; }
  .app{ display:flex; flex-direction:column; align-items:center; gap:7px; cursor:pointer;
    animation:pop .4s var(--ease) backwards; }
  .ico{ width:64px; height:64px; border-radius:20px; display:flex; align-items:center;
    justify-content:center; font-weight:800; font-size:23px; color:#fff; position:relative;
    box-shadow:0 8px 18px #0007, inset 0 1px 0 #ffffff35; overflow:hidden;
    transition:transform .18s var(--ease), box-shadow .18s var(--ease); }
  .ico::after{ content:""; position:absolute; inset:0; background:linear-gradient(160deg,#ffffff22,transparent 50%); }
  .app .lbl{ font-size:12px; color:#c5d3e3; font-weight:500; }
  .app:active .ico{ transform:scale(.88); box-shadow:0 4px 10px #0008; }

  /* ---- tela de app (slide up) ---- */
  #view{ position:absolute; inset:0; display:flex; flex-direction:column; background:#080d18;
    transform:translateY(100%); opacity:0; visibility:hidden;
    transition:transform .3s var(--ease), opacity .25s var(--ease), visibility .3s; z-index:40; }
  #view.on{ transform:translateY(0); opacity:1; visibility:visible; }
  #bar{ height:54px; flex:0 0 auto; display:flex; align-items:center; gap:12px; padding:0 12px;
    padding-top:env(safe-area-inset-top,0px); background:#0b1322; border-bottom:1px solid #1b2740; }
  #bar button.back{ width:40px; height:40px; border:0; border-radius:50%; background:#1b2740;
    color:var(--accent); font-size:20px; font-weight:700; transition:transform .15s var(--ease); }
  #bar button.back:active{ transform:scale(.85); }
  #bar .title{ font-size:19px; font-weight:700; color:#f1f5f9; }
  #body{ flex:1; overflow:auto; position:relative; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }
  #body>*{ animation:fade .35s var(--ease); }

  /* ---- widgets ---- */
  .pad{ padding:18px; }
  .btn{ border:0; border-radius:14px; padding:13px 18px; font-size:16px; font-weight:700; color:#fff;
    background:linear-gradient(135deg,#2f6bf0,#2563EB); transition:transform .12s var(--ease), filter .12s;
    box-shadow:0 4px 12px #2563eb44; }
  .btn:active{ transform:scale(.93); filter:brightness(1.1); }
  .btn.g{ background:linear-gradient(135deg,#34e08a,#2BD17A); color:#06281a; box-shadow:0 4px 12px #2bd17a44; }
  .btn.r{ background:linear-gradient(135deg,#f04444,#DC2626); box-shadow:0 4px 12px #dc262644; }
  .btn.s{ background:#2a3852; box-shadow:none; }
  input,textarea{ font-family:inherit; -webkit-user-select:text; user-select:text; }
  .field{ width:100%; padding:13px 15px; border-radius:13px; border:1px solid #2a3a55;
    background:#0e1626; color:#e5e7eb; font-size:16px; outline:none; transition:border .15s, box-shadow .15s; }
  .field:focus{ border-color:var(--accent); box-shadow:0 0 0 3px #2bd17a22; }
  iframe{ border:0; width:100%; height:100%; background:#fff; }
  .ripple{ position:absolute; border-radius:50%; transform:scale(0); background:#ffffff55;
    pointer-events:none; animation:rip .5s ease-out; }

  /* ---- assistente de IA ---- */
  #aibtn{ position:absolute; right:18px; bottom:calc(20px + env(safe-area-inset-bottom,0px));
    width:60px; height:60px; border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center;
    justify-content:center; font-size:27px; box-shadow:0 8px 24px #0009, 0 0 20px #2bd17a55; z-index:50;
    transition:transform .2s var(--ease); animation:floaty 3.5s ease-in-out infinite; }
  #aibtn:active{ transform:scale(.85); }
  #aiover{ position:absolute; inset:0; z-index:60; display:flex; flex-direction:column;
    background:linear-gradient(180deg,#0a1220,#05080f);
    transform:translateY(100%); transition:transform .32s var(--ease); }
  #aiover.on{ transform:translateY(0); }
  #aihead{ display:flex; align-items:center; gap:12px; padding:14px 18px;
    padding-top:calc(14px + env(safe-area-inset-top,0px)); border-bottom:1px solid #16223a; }
  #aihead .dot{ width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;font-size:18px; box-shadow:0 0 14px #2bd17a66; }
  #aihead .t{ font-weight:800; font-size:18px; flex:1; }
  #aihead .x{ font-size:22px; color:#94a3b8; padding:6px 10px; border-radius:50%; }
  #aihead .x:active{ background:#1b2740; }
  #aichat{ flex:1; overflow:auto; padding:16px; display:flex; flex-direction:column; gap:11px;
    -webkit-overflow-scrolling:touch; }
  .msg{ max-width:85%; padding:11px 14px; border-radius:18px; line-height:1.45; white-space:pre-wrap;
    font-size:15px; animation:msgin .3s var(--ease); box-shadow:0 2px 8px #0004; word-break:break-word; }
  .msg.u{ align-self:flex-end; background:linear-gradient(135deg,#2f6bf0,#2563EB); color:#fff; border-bottom-right-radius:5px; }
  .msg.a{ align-self:flex-start; background:#172238; color:#e8eef7; border-bottom-left-radius:5px; }
  #aiin{ display:flex; gap:10px; padding:12px 14px; padding-bottom:calc(12px + env(safe-area-inset-bottom,0px));
    background:#0a111e; border-top:1px solid #16223a; }
  #aiin .btn{ padding:13px 16px; }

  @keyframes pop{ from{ opacity:0; transform:translateY(12px) scale(.9); } to{ opacity:1; transform:none; } }
  @keyframes fade{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:none; } }
  @keyframes msgin{ from{ opacity:0; transform:translateY(10px) scale(.96); } to{ opacity:1; transform:none; } }
  @keyframes rip{ to{ transform:scale(3.2); opacity:0; } }
  @keyframes floaty{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-5px); } }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .spin{ display:inline-block; width:16px;height:16px;border:2px solid #ffffff40;border-top-color:#fff;
    border-radius:50%; animation:spin .8s linear infinite; vertical-align:-3px; }
  /* ---- tela de boot do Olal OS ---- */
  #boot{ position:absolute; inset:0; z-index:100; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px;
    background:radial-gradient(circle at 50% 38%, #182a4a, #05070c 75%); transition:opacity .6s ease; }
  #boot.gone{ opacity:0; pointer-events:none; }
  #boot .logo{ width:92px; height:92px; border-radius:50%; border:5px solid var(--accent);
    display:flex; align-items:center; justify-content:center; box-shadow:0 0 34px #2bd17a55;
    animation:pulse 1.5s ease-in-out infinite; }
  #boot .logo i{ width:40px; height:40px; border-radius:50%; background:var(--accent);
    box-shadow:0 0 16px #2bd17a; }
  #boot .name{ font-size:32px; font-weight:800; letter-spacing:1px; color:#f5f8fc; }
  #boot .sub{ color:var(--soft); font-size:13px; margin-top:-12px; }
  #boot .bar{ width:150px; height:4px; border-radius:2px; background:#ffffff18; overflow:hidden; margin-top:6px; }
  #boot .bar i{ display:block; height:100%; width:38%; background:var(--accent); border-radius:2px;
    animation:load 1.3s var(--ease) infinite; }
  @keyframes pulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.09); } }
  @keyframes load{ 0%{ transform:translateX(-120%); } 100%{ transform:translateX(420%); } }
  /* dica de primeiro uso */
  #hint{ position:absolute; left:14px; right:14px; bottom:90px; z-index:90; padding:14px 16px;
    border-radius:16px; background:#12233dee; border:1px solid #2BD17A55; box-shadow:0 10px 30px #000a;
    font-size:14px; line-height:1.5; transition:opacity .5s, transform .5s; }
  #hint.gone{ opacity:0; transform:translateY(12px); pointer-events:none; }
  /* menu de energia */
  #power{ position:absolute; inset:0; z-index:70; display:none; align-items:center; justify-content:center;
    background:#04070ecc; }
  #power.on{ display:flex; }
  #power .card{ background:#111c30; border-radius:20px; padding:22px; width:80%; max-width:300px;
    display:flex; flex-direction:column; gap:12px; box-shadow:0 20px 50px #000a; }
</style>
</head>
<body>
<div id="screen">
  <div id="status"><span class="olal">olal</span>
    <span class="right"><span class="dot"></span><span id="clock">--:--</span></span></div>
  <div id="home">
    <div id="greet">Bom dia</div>
    <div id="aihome" onclick="aiOpen()">
      <span class="d">🤖</span><span class="p">Pergunte qualquer coisa à Olal AI…</span>
    </div>
    <div id="grid"></div>
    <div id="build" style="text-align:center;color:#3b4a63;font-size:11px;margin-top:18px;letter-spacing:.3px"></div>
  </div>
  <div id="view">
    <div id="bar"><button class="back" onclick="closeApp()">&lt;</button><span class="title" id="vtitle"></span></div>
    <div id="body"></div>
  </div>

  <!-- assistente de IA: o cerebro do sistema, acessivel de qualquer tela -->
  <div id="aibtn" onclick="aiOpen()">🤖</div>
  <div id="aiover">
    <div id="aihead"><span class="dot">🤖</span><span class="t">Olal AI</span>
      <span class="x" onclick="aiClose()">✕</span></div>
    <div id="aichat"></div>
    <div id="aiin"><input class="field" id="aimsg" placeholder="peça qualquer coisa ao Olal...">
      <button class="btn g" id="aisend">➤</button></div>
  </div>

  <!-- menu de energia -->
  <div id="power" onclick="if(event.target.id==='power')powerMenu(false)">
    <div class="card">
      <div style="text-align:center;font-weight:700;font-size:18px;margin-bottom:4px">Energia</div>
      <button class="btn" onclick="sysPower('restart')">Reiniciar interface</button>
      <button class="btn r" onclick="sysPower('shutdown')">Desligar Olal OS</button>
      <button class="btn s" onclick="powerMenu(false)">Cancelar</button>
    </div>
  </div>

  <!-- tela de boot do Olal OS -->
  <div id="boot">
    <div class="logo"><i></i></div>
    <div class="name">Olal OS</div>
    <div class="sub">Linux real, movido por IA</div>
    <div class="bar"><i></i></div>
  </div>

  <!-- dica de primeiro uso (ensina o gesto de pinca pra ajustar o tamanho) -->
  <div id="hint" class="gone" onclick="hideHint()">
    🤏 Aperte com <b>2 dedos</b> pra ajustar o tamanho da tela • toque no <b>🤖</b> pra falar com a IA
    <div style="margin-top:8px;font-size:12px;opacity:.7">(toque pra fechar)</div>
  </div>
</div>

<script>
/* ============================================================
   OLAL AI - o cerebro do sistema. Uma LLM de verdade (sem chave,
   via Pollinations) que conversa E CONTROLA a OS inteira.
   ============================================================ */
const AI_SYS =
`Voce e a Olal AI, a inteligencia que comanda o Olal OS - um sistema operacional 100% movido por IA, feito no celular. Fale em portugues, de forma amigavel, curta e util.
Voce CONTROLA o sistema. Quando o usuario pedir para abrir um app, tocar musica/video, pesquisar ou navegar, responda em 1 frase curta e ADICIONE no final UMA linha exatamente assim:
@@ACT {"app":"NOME","query":"..."}
Apps validos: youtube (query=o que tocar), navegador (query=site ou termo), calc, notas, terminal, relogio, paint, ola32, sistema, rede, config, arquivos, js.
Exemplos:
toca lofi -> @@ACT {"app":"youtube","query":"lofi hip hop"}
abre a wikipedia dos gatos -> @@ACT {"app":"navegador","query":"https://pt.wikipedia.org/wiki/Gato"}
abre a calculadora -> @@ACT {"app":"calc"}
Se for so conversa, NAO inclua @@ACT.`;

/* tenta varios provedores de LLM (sem chave). Se a VPN bloquear um, tenta o
   proximo; por ultimo tenta pelo BACKEND (fetch no servidor, caminho de rede
   diferente do navegador - as vezes passa onde o navegador e barrado). */
async function _fetchTxt(url,opt,ms){
  const ac=new AbortController(); const tm=setTimeout(()=>ac.abort(),ms||20000);
  try{ const r=await fetch(url,Object.assign({signal:ac.signal},opt||{}));
    if(!r.ok) throw new Error("status "+r.status); const t=(await r.text()).trim();
    if(!t) throw new Error("vazio"); return t; }
  finally{ clearTimeout(tm); }
}
async function aiLLM(prompt){
  const enc=encodeURIComponent(prompt); let lastErr;
  const tries=[
    ()=>_fetchTxt("https://text.pollinations.ai/"+enc+"?model=openai"),
    ()=>_fetchTxt("https://text.pollinations.ai/"+enc),
    ()=>_fetchTxt("https://text.pollinations.ai/openai",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"openai",messages:[{role:"user",content:prompt}]})})
        .then(t=>{ try{const j=JSON.parse(t); return (j.choices?.[0]?.message?.content||t).trim();}catch(e){return t;} }),
  ];
  // ultimo recurso: proxy pelo backend do proprio Olal OS (so quando ha sistema)
  if(SYS_OK) tries.push(()=>_fetchTxt(SYS_API+"/api/ai",{method:"POST",
      headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt})},25000)
      .then(t=>{ try{const j=JSON.parse(t); return (j.text||t).trim();}catch(e){return t;} }));
  for(const fn of tries){ try{ return await fn(); }catch(e){ lastErr=e; } }
  throw lastErr||new Error("sem resposta");
}
async function aiAsk(history){
  const turns = history.slice(-6).map(m=>(m.role==="user"?"Usuario":"Olal")+": "+m.content).join("\n");
  return aiLLM(AI_SYS + "\n\n" + turns + "\nOlal:");
}

/* ===== AGENTE: a IA na raiz do OS, com CONTROLE TOTAL. Raciocina, executa
   comandos reais no sistema, observa o resultado e continua ate resolver. ===== */
const AGENT_SYS =
`Voce e a Olal AI, o AGENTE que controla o Olal OS (um Linux Debian real, no celular). Voce tem controle TOTAL do sistema.
Resolva a tarefa do usuario em passos. A cada passo responda com EXATAMENTE UMA linha, comecando com uma destas palavras:
EXEC: <comando bash>     -> roda no sistema; voce recebe a saida real e continua
APP: <nome>              -> abre um app do Olal (youtube, navegador, calc, notas, terminal, relogio, paint, ola32, sistema, js)
FINAL: <resposta>        -> quando terminar, responda ao usuario em portugues
Regras: use EXEC pra QUALQUER coisa do sistema (ver/criar arquivos, instalar com 'apt-get install -y', status, processos, rede, etc.). NUNCA invente a saida - espere a OBSERVACAO. Seja direto e eficiente. Se a tarefa for so conversa, responda direto com FINAL.`;
/* AGENTE OFFLINE: quando a LLM esta bloqueada (VPN), a IA ainda AGE de
   verdade - abre apps, roda comandos, instala pacotes, cria arquivos e
   responde perguntas do sistema, tudo pelo backend local. */
async function agentOffline(goal, onStep){
  const t = goal.trim(); let m;
  // 1) abrir app / tocar / pesquisar / navegar (sem rede)
  const li = localIntent(t); if(li) return li;
  if(!SYS_OK) return null;
  // 2) instalar pacote
  if((m = t.match(/^\s*instal[ae]r?\s+(?:o\s+|a\s+|pacote\s+)?(.+)/i))){
    const pk=m[1].trim().replace(/\s+/g,' '); onStep&&onStep("$ apt-get install -y "+pk);
    try{ const r=await sysExec("sudo apt-get install -y "+pk+" 2>&1 || apt-get install -y "+pk);
      return "📦 "+(/newly installed|already the newest|instala/i.test(r.out||"")?'"'+pk+'" pronto.':((r.out||"").trim().split("\n").slice(-2).join(" ")||"feito.")); }
    catch(e){ return "nao consegui instalar agora ("+e.message+")."; } }
  // 3) criar/escrever arquivo ou nota:  "cria o arquivo X com Y" / "anota Y"
  if((m = t.match(/^\s*(?:cri[ae]r?|escrev[ae]r?)\s+(?:o\s+|um\s+|a\s+)?(?:arquivo|nota|texto)\s+(\S+)(?:\s+com\s+(.+))?/i))){
    const fn=m[1], body=(m[2]||"").trim(); onStep&&onStep("$ escrevendo "+fn);
    try{ await sysExec("printf %s "+JSON.stringify(body)+" > "+JSON.stringify("$HOME/"+fn)); return "📝 criei ~/"+fn+(body?" com seu texto.":" (vazio)."); }
    catch(e){ return "nao consegui criar o arquivo."; } }
  if((m = t.match(/^\s*(?:anot[ae]r?|lembr[ae]r?(?:-me)?(?:\s+de)?)\s+(.+)/i))){
    const note=m[1].trim(); onStep&&onStep("$ salvando nota");
    try{ await sysExec("printf '%s\\n' "+JSON.stringify(note)+" >> "+JSON.stringify("$HOME/notas-olal.txt")); return "📝 anotei em ~/notas-olal.txt"; }
    catch(e){ return "nao consegui anotar."; } }
  // 4) perguntas comuns do sistema (memoria, disco, ip, processos...)
  const SQ2=[[/(mem[oó]ria|ram)/,"free -h | awk '/Mem:/{print $3\" de \"$2}'","🧠"],
    [/(disco|armazenamento|espa[çc]o)/,"df -h \"$HOME\" | awk 'NR==2{print $3\" de \"$2\" (\"$5\")\"}'","💾"],
    [/(processos)/,"ps -e --no-headers | wc -l","⚙️ processos:"],[/(uptime|ligad)/,"uptime -p","⏱️"],
    [/(meu ip|\bip\b)/,"hostname -I | awk '{print $1}'","🌐"],[/(kernel)/,"uname -r","🐧"]];
  for(const [re,cmd,lbl] of SQ2){ if(re.test(t.toLowerCase())){
    try{ const r=await sysExec(cmd); return lbl+" "+((r.out||"").trim()||"?"); }catch(e){} } }
  // 5) parece um comando shell? roda direto.
  if(/^[a-z][a-z0-9_-]*(\s|$)/i.test(t) && /\b(ls|cat|echo|pwd|df|free|ps|uname|whoami|date|apt|cd|mkdir|rm|cp|mv|grep|find|top|kill|ping|curl|wget|git|python3?|node|nano|touch)\b/.test(t)){
    onStep&&onStep("$ "+t); try{ const r=await sysExec(t); return "$ "+t+"\n"+((r.out||"(sem saida)").trim().slice(0,1500)); }catch(e){} }
  return null;
}
async function aiAgent(goal, onStep){
  let convo = AGENT_SYS + "\n\nTarefa do usuario: " + goal + "\n";
  for(let step=0; step<6; step++){
    let out;
    try{ out = await aiLLM(convo); }
    catch(e){
      // LLM bloqueada (VPN): cai pro agente OFFLINE, que ainda age de verdade.
      const off = await agentOffline(goal, onStep);
      return off || "A IA online esta bloqueada (sua VPN/rede recusa o acesso - tente DESLIGAR a VPN). Mesmo offline eu controlo o sistema: \"abre a calculadora\", \"instala htop\", \"anota comprar pao\", \"rode ls -la\", \"quanta memoria tem\".";
    }
    const line = (out.split("\n").find(l=>/^\s*(EXEC|APP|FINAL)\s*:/i.test(l)) || out).trim();
    let m;
    if((m = line.match(/^FINAL\s*:\s*([\s\S]+)/i))) return m[1].trim();
    if((m = line.match(/^APP\s*:\s*([a-z0-9]+)/i))){
      const app=m[1].toLowerCase();
      if(APP_IDX[app]!==undefined){ openApp(APP_IDX[app]); onStep&&onStep("📱 abrindo "+app);
        convo += "\nAPP: "+app+"\nOBSERVACAO: app '"+app+"' aberto.\n"; continue; }
    }
    if((m = line.match(/^EXEC\s*:\s*([\s\S]+)/i))){
      const cmd=m[1].trim(); onStep&&onStep("$ "+cmd);
      let obs="(sem backend - rode no Olal OS instalado)";
      try{ const r=await sysExec(cmd); obs=((r.out||"").trim()||"(sem saida)").slice(0,1800); }catch(e){ obs="erro: "+e.message; }
      onStep&&onStep(obs.split("\n").slice(0,3).join("\n"));
      convo += "\nEXEC: "+cmd+"\nOBSERVACAO:\n"+obs+"\n"; continue;
    }
    return out;   // resposta livre, sem protocolo
  }
  return "(atingi o limite de passos; me diga se quer que eu continue)";
}

/* ajuste mobile UNIVERSAL: escala o design (largura fixa de celular) pra
   preencher qualquer tela, via transform:scale (funciona em todo navegador,
   inclusive firefox-esr antigo onde 'zoom' nao existe) */
const screenEl=document.getElementById("screen");
const DW=400;                                     // largura de design (celular)
let userScale=parseFloat(localStorage.getItem("olal_scale")||"1")||1;
function olalApply(){
  const vv=window.visualViewport;
  const w=window.innerWidth||document.documentElement.clientWidth||screen.width;
  // usa a altura do visualViewport: quando o teclado virtual sobe, ela encolhe,
  // entao a interface se ajusta e o campo de digitar fica visivel acima do teclado.
  const h=(vv&&vv.height)||window.innerHeight||document.documentElement.clientHeight||screen.height;
  const s=Math.max(0.3, (w/DW)*userScale);
  screenEl.style.width=DW+"px";
  screenEl.style.height=(h/s)+"px";
  screenEl.style.transform="scale("+s+")";
}
function setScale(mult){ userScale=Math.min(2.2,Math.max(0.5, userScale*mult));
  localStorage.setItem("olal_scale",userScale.toFixed(3)); olalApply(); }
function resetScale(){ userScale=1; localStorage.setItem("olal_scale","1"); olalApply(); }
olalApply();
window.addEventListener("resize",olalApply);
window.addEventListener("orientationchange",olalApply);
window.addEventListener("load",olalApply);
/* reage ao teclado virtual subindo/descendo (mantem o input visivel) */
if(window.visualViewport){ window.visualViewport.addEventListener("resize",olalApply);
  window.visualViewport.addEventListener("scroll",olalApply); }
/* re-aplica nos primeiros segundos + a cada 1s no inicio (o Firefox no
   Termux:X11 pode reportar a largura atrasado) */
[80,200,500,1000,2000,3500].forEach(t=>setTimeout(olalApply,t));
let _fitN=0, _fitIv=setInterval(()=>{ olalApply(); if(++_fitN>8) clearInterval(_fitIv); },800);

/* a interface E fixa: NADA deve rolar a janela (o teclado virtual ou o foco
   num input nao pode empurrar a tela inteira pra fora). Forca volta ao topo. */
function _noScroll(){ if(window.scrollX||window.scrollY) window.scrollTo(0,0);
  const se=document.scrollingElement; if(se&&(se.scrollTop||se.scrollLeft)){ se.scrollTop=0; se.scrollLeft=0; } }
window.addEventListener("scroll",_noScroll,{passive:true});

document.addEventListener("pointerdown",e=>{
  const t=e.target.closest(".app, .btn, .ico, #aihome, .back, .ytrow, [data-ripple]");
  if(!t) return;
  const r=t.getBoundingClientRect(); const rip=document.createElement("span");
  rip.className="ripple"; const sz=Math.max(r.width,r.height);
  rip.style.width=rip.style.height=sz+"px";
  rip.style.left=(e.clientX-r.left-sz/2)+"px"; rip.style.top=(e.clientY-r.top-sz/2)+"px";
  const pos=getComputedStyle(t).position; if(pos==="static") t.style.position="relative";
  t.appendChild(rip); setTimeout(()=>rip.remove(),500);
},{passive:true});

/* gesto: PINÇA pra redimensionar a interface inteira (resolve tamanho na hora) */
let _pinch=0;
document.addEventListener("touchmove",e=>{
  if(e.touches.length===2 && e.touches[0] && e.touches[1]){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    if(_pinch){ const r=d/_pinch;
      if(Math.abs(r-1)>0.015){ userScale=Math.min(3,Math.max(0.4,userScale*r));
        localStorage.setItem("olal_scale",userScale.toFixed(3)); olalApply(); _pinch=d; } }
    else _pinch=d;
    e.preventDefault();
  }
},{passive:false});
document.addEventListener("touchend",e=>{ if(e.touches.length<2) _pinch=0; },{passive:true});

/* gesto: deslizar da borda esquerda pra VOLTAR (nativo de celular) */

  if((m=t.match(/\b(?:toc[ae]r?|play|p[õo]e|poe|coloca|reproduz(?:ir)?)\s+(.+?)\s*$/))){
    const q=m[1].replace(/\s+no\s+youtube\s*$/,"").trim(); if(q){ ytGo(q); return 'tocando "'+q+'" no YouTube 🎵'; } }

/* ----- YouTube REAL: busca de verdade + player por ID (toca de verdade) -----
   O embed por listType=search foi descontinuado pelo YouTube; entao buscamos
   os resultados reais (via r.jina.ai) e tocamos pelo ID, que e confiavel. */
async function ytSearch(term){
  const insts=["api.piped.private.coffee","pipedapi.leptons.xyz","pipedapi.r4fo.com","pipedapi.adminforge.de","pipedapi.kavin.rocks"];
  for(const h of insts){
    try{ const r=await fetch("https://"+h+"/search?q="+encodeURIComponent(term)+"&filter=videos");
      if(!r.ok) continue; const j=await r.json(); const arr=j.items||j; if(!arr||!arr.length) continue;
      const items=[], seen=new Set();
      for(const v of arr){ const mm=(v.url||"").match(/v=([\w-]{11})/); if(!mm||seen.has(mm[1]))continue;
        seen.add(mm[1]); items.push({title:(v.title||"video").trim(),id:mm[1]}); if(items.length>=25)break; }
      if(items.length) return items;
    }catch(e){}
  }
  try{ const r=await fetch("https://r.jina.ai/https://www.youtube.com/results?search_query="+encodeURIComponent(term));
    const t=await r.text(); const seen=new Set(), items=[];
    const re=/\[([^\]]{4,90})\]\([^)]*watch\?v=([\w-]{11})/g; let m;
    while((m=re.exec(t)) && items.length<25){ const ti=m[1].trim(), id=m[2];
      if(seen.has(id)||/^(mix|https?|www\.)/i.test(ti)||ti.length<4)continue; seen.add(id); items.push({title:ti,id}); }
    return items;
  }catch(e){ return []; }
}

/* ----- Calculadora ----- */
function appCalc(b){
  b.innerHTML=`<div class="pad"><div id="disp" style="text-align:right;font-size:40px;
    background:#1E293B;border-radius:14px;padding:18px;margin-bottom:14px;min-height:30px">0</div>
    <div id="keys" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px"></div></div>`;
  let acc=0,cur="0",op=null,fresh=true;
  const disp=()=>document.getElementById("disp").textContent=cur;
  const K="7 8 9 / 4 5 6 * 1 2 3 - C 0 = +".split(" ");
  const kd=document.getElementById("keys");
  K.forEach(k=>{ const btn=document.createElement("button"); btn.className="btn s"; btn.textContent=k;
    btn.style.height="62px"; btn.style.fontSize="22px";
    if("+-*/".includes(k)) btn.style.background="#2563EB";
    if(k==="=") btn.style.background="#2BD17A"; if(k==="C") btn.style.background="#DC2626";
    btn.onclick=()=>{
      if(/[0-9]/.test(k)){ cur=(fresh||cur==="0")?k:cur+k; fresh=false; }
      else if(k==="C"){ acc=0;cur="0";op=null;fresh=true; }
      else if(k==="="){ if(op){ cur=String(calc(acc,op,parseFloat(cur))); op=null; fresh=true; } }
      else { if(op) acc=calc(acc,op,parseFloat(cur)); else acc=parseFloat(cur); op=k; fresh=true; }
      disp(); };
    kd.appendChild(btn); });
  function calc(a,o,b){ return o==="+"?a+b:o==="-"?a-b:o==="*"?a*b:o==="/"?(b?a/b:0):b; }
}

/* ----- OLA-32 (nossa CPU, emulador em JS) ----- */
function appOla32(b){
  const code=["li r1,0","li r2,1","li r3,12","loop:","sys r1,2","add r6,r1,r2",
    "add r1,r0,r2","add r2,r0,r6","addi r4,r4,1","bne r4,r3,loop","hlt"];
  const out=runOla32(code);
  b.innerHTML=`<div class="pad">
    <div style="color:#c4b5fd">Arquitetura criada do zero (16 regs, RISC 32-bit)</div>
    <div style="background:#140c24;border-radius:10px;padding:12px;margin:12px 0">
      <div style="color:#94a3b8">rodando na nossa CPU:</div>
      <div style="color:#6ee7b7;font-size:22px;font-weight:700">${out}</div></div>
    <pre style="background:#140c24;border-radius:10px;padding:12px;color:#cbd5e1;font-size:13px">${code.join("\n")}</pre>
    <div style="color:#94a3b8;font-size:13px">CPU, montador e emulador 100% nossos (arch/).</div></div>`;
}
function runOla32(prog){
  const R=new Array(16).fill(0); const labels={}; const ins=[];
  prog.forEach(l=>{ l=l.trim(); if(!l)return; if(l.endsWith(":")){labels[l.slice(0,-1)]=ins.length;return;} ins.push(l); });
  let out=[],pc=0,guard=0;
  const reg=s=>parseInt(s.replace("r",""));
  while(pc<ins.length && guard++<10000){
    const p=ins[pc].split(/[ ,]+/); const op=p[0]; pc++;
    if(op==="li") R[reg(p[1])]=parseInt(p[2]);
    else if(op==="add") R[reg(p[1])]=R[reg(p[2])]+R[reg(p[3])];
    else if(op==="addi") R[reg(p[1])]=R[reg(p[2])]+parseInt(p[3]);
    else if(op==="sys") out.push(R[reg(p[1])]);
    else if(op==="bne"){ if(R[reg(p[1])]!==R[reg(p[2])]) pc=labels[p[3]]; }
    else if(op==="hlt") break;
  }
  return out.join(" ");
}

  const cv=b.querySelector("#cv"); const ctx=cv.getContext("2d");
  setTimeout(()=>{ cv.width=cv.clientWidth; cv.height=cv.clientHeight; },50);
  let col="#EF4444",down=false;
  ["#EF4444","#22C55E","#3B82F6","#EAB308","#111827","#fff"].forEach(c=>{
    const d=document.createElement("button"); d.className="btn"; d.style.background=c; d.style.width="42px"; d.style.height="42px";
    d.onclick=()=>col=c; b.querySelector("#pal").appendChild(d); });
  const pos=e=>{ const r=cv.getBoundingClientRect(); const t=e.touches?e.touches[0]:e;
    return {x:t.clientX-r.left,y:t.clientY-r.top}; };
  const start=e=>{down=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault();};
  const move=e=>{ if(!down)return;const p=pos(e);ctx.strokeStyle=col;ctx.lineWidth=6;ctx.lineCap="round";
    ctx.lineTo(p.x,p.y);ctx.stroke();e.preventDefault();};
  const end=()=>down=false;
  cv.addEventListener("mousedown",start);cv.addEventListener("mousemove",move);cv.addEventListener("mouseup",end);
  cv.addEventListener("touchstart",start);cv.addEventListener("touchmove",move);cv.addEventListener("touchend",end);
}

    if(!SYS_OK){ flist.innerHTML='<div style="color:#94a3b8;padding:16px">Arquivos reais aparecem no Olal OS instalado (abra pelo <b>./olal</b>).</div>'; fpath.textContent="(preview)"; return; }
    sysLs(path).then(d=>{ fpath.textContent="📁 "+d.path;
      if(d.error){ flist.innerHTML='<div style="color:#ef4444;padding:16px">'+d.error+'</div>'; return; }
      let h="";
      if(d.parent && d.parent!==d.path) h+=row("..","dir",0,d.parent);
      for(const it of d.items) h+=row(it.name, it.dir?"dir":"file", it.size, (d.path.endsWith("/")?d.path:d.path+"/")+it.name);
      flist.innerHTML=h||'<div style="color:#94a3b8;padding:16px">(pasta vazia)</div>';
      flist.querySelectorAll("[data-p]").forEach(el=>el.onclick=()=>{
        if(el.dataset.d==="1") open(el.dataset.p); else viewFile(el.dataset.p); });
    }).catch(()=>flist.innerHTML='<div style="color:#ef4444;padding:16px">erro ao ler (backend offline?)</div>');
  }
  function viewFile(path){
    const name=path.split("/").pop();
    fetch(SYS_API+"/api/read?path="+encodeURIComponent(path)).then(r=>r.json()).then(d=>{
      flist.innerHTML=
        `<div style="display:flex;gap:8px;margin-bottom:10px">
           <button class="btn s" style="width:auto;padding:8px 14px;margin:0" id="fback">‹ Voltar</button>
           <div style="flex:1;align-self:center;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</div></div>
         <pre style="background:#0a1120;border:1px solid #1e2a44;border-radius:10px;padding:12px;overflow:auto;font-size:12px;white-space:pre-wrap;word-break:break-word;max-height:calc(100% - 50px)">${
           d.error?("nao da pra abrir: "+d.error):(d.text||"(vazio)").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))}</pre>`;
      const back=flist.querySelector("#fback");
      if(back) back.onclick=()=>open(fpath.textContent.replace(/^📁 /,""));
    }).catch(()=>{});
  }
  const row=(name,kind,size,full)=>
    `<div data-p="${full.replace(/"/g,'&quot;')}" data-d="${kind==='dir'?1:0}" style="display:flex;align-items:center;gap:12px;background:#1E293B;border-radius:10px;padding:11px;margin-bottom:7px;cursor:pointer">
      <div style="width:34px;height:34px;border-radius:8px;background:${kind==='dir'?'#EAB308':'#2563EB'};display:flex;align-items:center;justify-content:center;font-weight:700">${kind==='dir'?'📁':'📄'}</div>
      <div style="flex:1"><div>${name}</div><div style="color:#94a3b8;font-size:12px">${kind==='dir'?'pasta':fmtsz(size)}</div></div></div>`;
  open("");
}
</script>
</body>
</html>

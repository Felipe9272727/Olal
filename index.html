<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Olal OS</title>
<style>
  html,body{margin:0;height:100%;background:#05070c;overflow:hidden;
            font-family:system-ui,sans-serif;touch-action:none;color:#cbd5e1;}
  #wrap{display:flex;align-items:center;justify-content:center;height:100%;}
  #screen_container canvas{display:block;image-rendering:pixelated;
            box-shadow:0 0 40px #0008;border-radius:6px;}
  #screen_container div{display:none;}            /* esconde a camada de texto */
  #status{position:fixed;top:0;left:0;right:0;font:13px monospace;padding:8px;
            background:#000b;text-align:center;z-index:9;color:#6ee7b7;}
  .ripple{position:fixed;width:46px;height:46px;margin:-23px 0 0 -23px;border-radius:50%;
            border:2px solid #6ee7b7;pointer-events:none;z-index:8;
            animation:rip .4s ease-out forwards;}
  @keyframes rip{from{transform:scale(.3);opacity:.9}to{transform:scale(1.1);opacity:0}}
</style>
</head>
<body>
<div id="status">carregando Olal OS...</div>
<div id="wrap"><div id="screen_container"><canvas></canvas></div></div>

<script src="lib/libv86.js"></script>
<script>
const GW = 480, GH = 800;
const statusEl = document.getElementById("status");
const setStatus = (t, ok) => { statusEl.textContent = t; if(ok!==undefined) statusEl.style.color = ok ? "#6ee7b7" : "#fca5a5"; };

window.addEventListener("error", e => setStatus("erro: " + e.message, false));

let emulator;
try {
    const V86CLASS = window.V86 || window.V86Starter;
    emulator = new V86CLASS({
        wasm_path: "lib/v86.wasm",
        bios:     { url: "lib/seabios.bin" },
        vga_bios: { url: "lib/vgabios.bin" },
        fda:      { url: "olal.img?v=ddgreal" },
        net_device: { type: "ne2k" },   /* sem relay publico confiavel hoje (rede so com gateway proprio) */
        memory_size: 64 * 1024 * 1024,
        vga_memory_size: 16 * 1024 * 1024,
        screen_container: document.getElementById("screen_container"),
        autostart: true,
    });
    emulator.add_listener("download-progress", e => {
        if(e && e.total) setStatus("baixando " + (e.file_name||"") + " " + Math.round(100*e.loaded/e.total) + "%");
    });
    emulator.add_listener("download-error", e => setStatus("falha ao baixar " + (e&&e.file_name||""), false));
    emulator.add_listener("emulator-ready", () => {
        try { emulator.mouse_set_status(true); } catch(_) {}
        setStatus("Olal OS — toque na tela", true);
        setTimeout(() => statusEl.style.display = "none", 6000);
    });
    setTimeout(() => { if(statusEl.style.display !== "none" && statusEl.textContent.indexOf("toque")<0)
        setStatus("ainda carregando... (1a vez baixa ~3MB)"); }, 12000);
} catch(err) {
    setStatus("erro ao iniciar: " + err.message, false);
}

/* ---------- GATEWAY DE REDE NO NAVEGADOR ----------
   O kernel faz TODA a sua pilha de rede (NE2000, ARP, IP, DHCP, DNS, TCP, HTTP).
   O navegador nao pode abrir socket cru, entao este JS faz o papel do
   "modem/roteador": responde DHCP/ARP/DNS, termina o TCP do kernel e busca a
   pagina de verdade com fetch() via um proxy CORS (que tambem faz o HTTPS). */
(function installNet(){
    if(!emulator) return;
    const SRVMAC=[0x52,0x55,0x0a,0,2,2], CLIENT=[10,0,2,15], GWIP=[10,0,2,2], WEBIP=[10,0,2,3];
    let KMAC=[0,0,0,0,0,0];
    /* r.jina.ai: le a pagina de verdade, limpa pra texto/markdown e manda
       cabecalho CORS (funciona no navegador). E o "modem" que nos faltava. */
    const PROXIES = [u=>"https://r.jina.ai/"+u,
                     u=>"https://api.allorigins.win/raw?url="+encodeURIComponent(u)];
    const IMG_PROXIES = [u=>"https://api.allorigins.win/raw?url="+encodeURIComponent(u)];
    const chk=(b,o,l)=>{let s=0;for(let i=0;i<l;i+=2)s+=(b[o+i]<<8)|(b[o+i+1]||0);while(s>>16)s=(s&0xFFFF)+(s>>16);return(~s)&0xFFFF;};
    const snd=f=>emulator.bus.send("net0-receive",new Uint8Array(f));
    const eth=(d,s,t)=>[...d,...s,t>>8,t&255];
    function ip(src,dst,p,pl){let h=[0x45,0,0,0,0,0,0,0,64,p,0,0,...src,...dst];const t=20+pl.length;h[2]=t>>8;h[3]=t&255;const c=chk(h,0,20);h[10]=c>>8;h[11]=c&255;return[...h,...pl];}
    const udp=(src,dst,sp,dp,pl)=>ip(src,dst,17,[sp>>8,sp&255,dp>>8,dp&255,(8+pl.length)>>8,(8+pl.length)&255,0,0,...pl]);
    function tcp(src,dst,sp,dp,seq,ack,fl,d){let t=[sp>>8,sp&255,dp>>8,dp&255,seq>>>24&255,seq>>>16&255,seq>>>8&255,seq&255,ack>>>24&255,ack>>>16&255,ack>>>8&255,ack&255,0x50,fl,0x20,0,0,0,0,0,...d];let s=0;const ph=[...src,...dst,0,6,(t.length>>8)&255,t.length&255];for(let i=0;i<ph.length;i+=2)s+=(ph[i]<<8)|(ph[i+1]||0);for(let i=0;i<t.length;i+=2)s+=(t[i]<<8)|(t[i+1]||0);while(s>>16)s=(s&0xFFFF)+(s>>16);s=(~s)&0xFFFF;t[16]=s>>8;t[17]=s&255;return ip(src,dst,6,t);}
    const conns={};
    async function fetchPage(host,path){
        const target=(host.indexOf("http")===0?host:"https://"+host)+path;
        console.log("[net] buscando "+target);
        for(const mk of PROXIES){
            try{ const ac=new AbortController(); const tm=setTimeout(()=>ac.abort(),20000);
                 const r=await fetch(mk(target),{redirect:"follow",signal:ac.signal}); clearTimeout(tm);
                 let body=await r.text(); console.log("[net] recebeu "+body.length+" bytes");
                 if(body){
                     let bad=0; for(let i=0;i<Math.min(body.length,300);i++) if(body.charCodeAt(i)===0xFFFD) bad++;
                     if(bad>40) return "<p>[imagem]</p>";   /* conteudo binario (imagem) */
                     return body.slice(0,20000);
                 } }catch(e){ console.log("[net] proxy falhou: "+e); }
        }
        return "<h1>Sem internet</h1><p>O navegador nao alcancou a rede (proxy fora ou sem conexao). A pilha do kernel funcionou ate aqui.</p>";
    }
    /* baixa as imagens da pagina, decodifica no navegador e manda os pixels
       (RGB) para a RAM do kernel, que so desenha. O kernel nao precisa de
       decodificador de JPEG/PNG: o navegador ja sabe abrir qualquer imagem. */
    function absUrl(s, host){
        if(s.indexOf("http")===0) return s;
        if(s.indexOf("//")===0) return "https:"+s;
        return "https://"+host+(s[0]==="/"?"":"/")+s;
    }
    async function fetchImg(u){                 /* imagens: proxy que devolve bytes crus */
        for(const mk of IMG_PROXIES){
            try{ const r=await fetch(mk(u)); const blob=await r.blob();
                 return await createImageBitmap(blob); }catch(e){}
        }
        return null;
    }
    async function processImages(host, path, html){
        try{
            emulator.write_memory(new Uint8Array([0,0,0,0]), 0x600004);   /* zera contagem */
            let urls=[absUrl(path, host)];      /* a propria URL, caso seja uma imagem */
            const re=/<img[^>]+?(?:data-src|src)\s*=\s*["']?([^"'\s>]+)/gi; let m;
            while((m=re.exec(html)) && urls.length<7) urls.push(absUrl(m[1], host));
            let count=0, pixoff=0, y=300;
            for(const u of urls){
                const bmp=await fetchImg(u); if(!bmp) continue;
                const sc=Math.min(440/bmp.width, 160/bmp.height, 1);
                const w=Math.max(1,Math.round(bmp.width*sc)), h=Math.max(1,Math.round(bmp.height*sc));
                if(y+h>538) break;
                const cv=new OffscreenCanvas(w,h); const cx=cv.getContext("2d"); cx.drawImage(bmp,0,0,w,h);
                const d=cx.getImageData(0,0,w,h).data;
                const rgb=new Uint8Array(w*h*3); for(let i=0,j=0;i<d.length;i+=4){rgb[j++]=d[i];rgb[j++]=d[i+1];rgb[j++]=d[i+2];}
                emulator.write_memory(rgb, 0x601000+pixoff);
                const hd=new ArrayBuffer(20); const dv=new DataView(hd);
                dv.setUint32(0,20,true);dv.setUint32(4,y,true);dv.setUint32(8,w,true);dv.setUint32(12,h,true);dv.setUint32(16,pixoff,true);
                emulator.write_memory(new Uint8Array(hd), 0x600010+count*20);
                pixoff+=w*h*3; y+=h+6; count++;
                emulator.write_memory(new Uint8Array(new Uint32Array([count]).buffer), 0x600004);
            }
        }catch(e){}
    }
    function streamResponse(c,sp,dp,body){
        const head="HTTP/1.1 200 OK\r\nContent-Type: text/html\r\nContent-Length: "+body.length+"\r\n\r\n";
        const all=head+body; const bytes=[]; for(let i=0;i<all.length;i++) bytes.push(all.charCodeAt(i)&255);
        for(let i=0;i<bytes.length;i+=256){ const ch=bytes.slice(i,i+256);
            snd(eth(KMAC,SRVMAC,0x0800).concat(tcp(WEBIP,CLIENT,80,sp,c.nseq,c.kack,0x18,ch))); c.nseq=(c.nseq+ch.length)>>>0; }
        snd(eth(KMAC,SRVMAC,0x0800).concat(tcp(WEBIP,CLIENT,80,sp,c.nseq,c.kack,0x11,[]))); c.nseq=(c.nseq+1)>>>0; /* FIN */
    }
    emulator.add_listener("net0-send", fr => {
        const f=new Uint8Array(fr); KMAC=[...f.slice(6,12)]; const ty=(f[12]<<8)|f[13];
        if(ty===0x0806){ const tip=[...f.slice(38,42)]; if(tip.join('.')===GWIP.join('.'))
            snd(eth(KMAC,SRVMAC,0x0806).concat([0,1,8,0,6,4,0,2,...SRVMAC,...GWIP,...KMAC,...f.slice(28,32)])); return; }
        if(ty!==0x0800) return;
        const ihl=(f[14]&0xF)*4, off=14+ihl, proto=f[23];
        if(proto===17){ const sp=(f[off]<<8)|f[off+1], dp=(f[off+2]<<8)|f[off+3];
            if(dp===67){ let o=off+8,t=0;while(o<f.length&&f[o]!==255){const op=f[o++],l=f[o++];if(op===53)t=f[o];o+=l;}
                const xid=[...f.slice(off+12,off+16)]; let d=new Array(240).fill(0); d[0]=2;d[1]=1;d[2]=6;
                d[4]=xid[0];d[5]=xid[1];d[6]=xid[2];d[7]=xid[3]; d[16]=10;d[17]=0;d[18]=2;d[19]=15;
                for(let i=0;i<6;i++)d[28+i]=KMAC[i]; d[236]=0x63;d[237]=0x82;d[238]=0x53;d[239]=0x63;
                d.push(53,1,(t===1?2:5),54,4,...GWIP,51,4,0,0,0xa8,0xc0,1,4,255,255,255,0,3,4,...GWIP,6,4,...GWIP,255);
                snd(eth(KMAC,SRVMAC,0x0800).concat(udp(GWIP,[255,255,255,255],67,68,d))); }
            else if(dp===53){ const q=[...f.slice(off+8)]; let qe=12;while(q[qe])qe+=q[qe]+1;qe+=5;
                const ans=[q[0],q[1],0x81,0x80,0,1,0,1,0,0,0,0,...q.slice(12,qe),0xc0,0x0c,0,1,0,1,0,0,0,60,0,4,...WEBIP];
                const sp=(f[off]<<8)|f[off+1]; snd(eth(KMAC,SRVMAC,0x0800).concat(udp(GWIP,CLIENT,53,sp,ans))); }
        } else if(proto===6){ const sp=(f[off]<<8)|f[off+1], dp=(f[off+2]<<8)|f[off+3];
            const seq=(f[off+4]*16777216)+(f[off+5]<<16)+(f[off+6]<<8)+f[off+7];
            const fl=f[off+13], doff=(f[off+12]>>4)*4, iptot=(f[16]<<8)|f[17], dlen=iptot-ihl-doff;
            if(fl&0x02){ conns[sp]={nseq:5000,kack:(seq+1)>>>0,host:"",path:"/"};
                snd(eth(KMAC,SRVMAC,0x0800).concat(tcp(WEBIP,CLIENT,80,sp,conns[sp].nseq,conns[sp].kack,0x12,[]))); conns[sp].nseq=5001; }
            else if(conns[sp]){ const c=conns[sp];
                if(dlen>0){ c.kack=(seq+dlen)>>>0;
                    let req=""; for(let i=0;i<dlen;i++) req+=String.fromCharCode(f[off+doff+i]);
                    snd(eth(KMAC,SRVMAC,0x0800).concat(tcp(WEBIP,CLIENT,80,sp,c.nseq,c.kack,0x10,[])));
                    if(!c.fetching){ c.fetching=1;
                        emulator.write_memory(new Uint8Array([0,0,0,0]), 0x600004);  /* limpa imagens antigas */
                        const m=req.match(/^GET\s+(\S+)\s/), hm=req.match(/Host:\s*([^\r\n]+)/i);
                        const host=hm?hm[1].trim():"", path=m?m[1]:"/";
                        fetchPage(host, path).then(b=>{ c.body=b; processImages(host, path, b); });
                    }
                    /* injeta a resposta SINCRONO numa retransmissao do GET (assim
                       o v86 processa o frame; injecao assincrona nao funciona) */
                    if(c.body !== undefined && !c.sent){ c.sent=1; streamResponse(c,sp,dp,c.body); }
                }
                if(fl&0x01){ delete conns[sp]; }
            }
        }
    });
})();

/* ---------- TOUCH REAL: escreve a coordenada absoluta direto na RAM do
   kernel (mailbox em 0x5000). Tocou num ponto = aquele ponto, na hora. ---------- */
const MB = 0x5000, MAGIC = 0x4F4C4131;
const clamp = (v,a,b) => v<a?a:(v>b?b:v);
function wU32(addr, v){ emulator.write_memory(new Uint8Array([v&255,(v>>>8)&255,(v>>>16)&255,(v>>>24)&255]), addr); }
let seq = 0, clicks = 0;
function setTouch(gx, gy, down){
    if(!emulator) return;
    gx = clamp(Math.round(gx), 0, GW-1);
    gy = clamp(Math.round(gy), 0, GH-1);
    wU32(MB, MAGIC);                       /* (re)ativa o modo touch */
    wU32(MB+8, gx); wU32(MB+12, gy); wU32(MB+16, down ? 1 : 0); wU32(MB+4, ++seq);
}
function endTouch(gx, gy){
    if(!emulator) return;
    gx = clamp(Math.round(gx), 0, GW-1);
    gy = clamp(Math.round(gy), 0, GH-1);
    wU32(MB, MAGIC);
    wU32(MB+8, gx); wU32(MB+12, gy); wU32(MB+16, 0); wU32(MB+20, ++clicks); wU32(MB+4, ++seq);
}
const canvas = () => document.querySelector("#screen_container canvas");
function toGuest(p){
    const r = canvas().getBoundingClientRect();
    return { x: (p.clientX - r.left) / r.width * GW,
             y: (p.clientY - r.top)  / r.height * GH };
}
function ripple(cx, cy){
    const r = document.createElement("div");
    r.className = "ripple"; r.style.left = cx+"px"; r.style.top = cy+"px";
    document.body.appendChild(r);
    setTimeout(() => r.remove(), 420);
}

let lastG = { x: GW/2, y: GH/2 };
const sc = document.getElementById("screen_container");
sc.addEventListener("touchstart", e => { e.preventDefault();
    const t = e.touches[0]; ripple(t.clientX, t.clientY);
    lastG = toGuest(t); setTouch(lastG.x, lastG.y, 1); }, {passive:false});
sc.addEventListener("touchmove",  e => { e.preventDefault();
    lastG = toGuest(e.touches[0]); setTouch(lastG.x, lastG.y, 1); }, {passive:false});
sc.addEventListener("touchend",   e => { e.preventDefault(); endTouch(lastG.x, lastG.y); }, {passive:false});
sc.addEventListener("mousedown",  e => { lastG = toGuest(e); setTouch(lastG.x, lastG.y, 1); });
sc.addEventListener("mousemove",  e => { if(e.buttons & 1){ lastG = toGuest(e); setTouch(lastG.x, lastG.y, 1); } });
sc.addEventListener("mouseup",    e => { const g = toGuest(e); endTouch(g.x, g.y); });

function fit(){
    const c = canvas(); if(!c) return;
    const s = Math.min(window.innerWidth/GW, window.innerHeight/GH);
    c.style.width  = (GW*s)+"px";
    c.style.height = (GH*s)+"px";
}
setInterval(fit, 400);
window.addEventListener("resize", fit);

/* trava zoom/scroll do navegador para o toque ser preciso */
document.addEventListener("gesturestart", e => e.preventDefault());
document.addEventListener("touchmove", e => e.preventDefault(), {passive:false});
let lastTouch = 0;
document.addEventListener("touchend", e => {
    const now = Date.now();
    if(now - lastTouch < 300) e.preventDefault();   /* impede double-tap zoom */
    lastTouch = now;
}, {passive:false});
</script>
</body>
</html>

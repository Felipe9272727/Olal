<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Olal OS</title>
<style>
  html,body{margin:0;height:100%;background:#05070c;overflow:hidden;
            font-family:system-ui,sans-serif;touch-action:none;color:#cbd5e1;}
  #wrap{display:flex;align-items:center;justify-content:center;height:100%;}
  #screen_container canvas{display:block;image-rendering:pixelated;
            box-shadow:0 0 40px #0008;border-radius:6px;}
  #screen_container div{display:none;}            /* esconde a camada de texto */
  #status{position:fixed;top:0;left:0;right:0;font:13px monospace;padding:8px;
            background:#000b;text-align:center;z-index:9;color:#6ee7b7;}
  .ripple{position:fixed;width:46px;height:46px;margin:-23px 0 0 -23px;border-radius:50%;
            border:2px solid #6ee7b7;pointer-events:none;z-index:8;
            animation:rip .4s ease-out forwards;}
  @keyframes rip{from{transform:scale(.3);opacity:.9}to{transform:scale(1.1);opacity:0}}
</style>
</head>
<body>
<div id="status">carregando Olal OS...</div>
<div id="wrap"><div id="screen_container"><canvas></canvas></div></div>

<script src="lib/libv86.js"></script>
<script>
const GW = 480, GH = 800;
const statusEl = document.getElementById("status");
const setStatus = (t, ok) => { statusEl.textContent = t; if(ok!==undefined) statusEl.style.color = ok ? "#6ee7b7" : "#fca5a5"; };

window.addEventListener("error", e => setStatus("erro: " + e.message, false));

let emulator;
try {
    const V86CLASS = window.V86 || window.V86Starter;
    emulator = new V86CLASS({
        wasm_path: "lib/v86.wasm",
        bios:     { url: "lib/seabios.bin" },
        vga_bios: { url: "lib/vgabios.bin" },
        fda:      { url: "olal.img" },
        net_device: { type: "ne2k" },   /* sem relay publico confiavel hoje (rede so com gateway proprio) */
        memory_size: 64 * 1024 * 1024,
        vga_memory_size: 16 * 1024 * 1024,
        screen_container: document.getElementById("screen_container"),
        autostart: true,
    });
    emulator.add_listener("download-progress", e => {
        if(e && e.total) setStatus("baixando " + (e.file_name||"") + " " + Math.round(100*e.loaded/e.total) + "%");
    });
    emulator.add_listener("download-error", e => setStatus("falha ao baixar " + (e&&e.file_name||""), false));
    emulator.add_listener("emulator-ready", () => {
        try { emulator.mouse_set_status(true); } catch(_) {}
        setStatus("Olal OS — toque na tela", true);
        setTimeout(() => statusEl.style.display = "none", 6000);
    });
    setTimeout(() => { if(statusEl.style.display !== "none" && statusEl.textContent.indexOf("toque")<0)
        setStatus("ainda carregando... (1a vez baixa ~3MB)"); }, 12000);
} catch(err) {
    setStatus("erro ao iniciar: " + err.message, false);
}

/* ---------- TOUCH REAL: escreve a coordenada absoluta direto na RAM do
   kernel (mailbox em 0x5000). Tocou num ponto = aquele ponto, na hora. ---------- */
const MB = 0x5000, MAGIC = 0x4F4C4131;
const clamp = (v,a,b) => v<a?a:(v>b?b:v);
function wU32(addr, v){ emulator.write_memory(new Uint8Array([v&255,(v>>>8)&255,(v>>>16)&255,(v>>>24)&255]), addr); }
let seq = 0, clicks = 0;
function setTouch(gx, gy, down){
    if(!emulator) return;
    gx = clamp(Math.round(gx), 0, GW-1);
    gy = clamp(Math.round(gy), 0, GH-1);
    wU32(MB, MAGIC);                       /* (re)ativa o modo touch */
    wU32(MB+8, gx); wU32(MB+12, gy); wU32(MB+16, down ? 1 : 0); wU32(MB+4, ++seq);
}
function endTouch(gx, gy){
    if(!emulator) return;
    gx = clamp(Math.round(gx), 0, GW-1);
    gy = clamp(Math.round(gy), 0, GH-1);
    wU32(MB, MAGIC);
    wU32(MB+8, gx); wU32(MB+12, gy); wU32(MB+16, 0); wU32(MB+20, ++clicks); wU32(MB+4, ++seq);
}
const canvas = () => document.querySelector("#screen_container canvas");
function toGuest(p){
    const r = canvas().getBoundingClientRect();
    return { x: (p.clientX - r.left) / r.width * GW,
             y: (p.clientY - r.top)  / r.height * GH };
}
function ripple(cx, cy){
    const r = document.createElement("div");
    r.className = "ripple"; r.style.left = cx+"px"; r.style.top = cy+"px";
    document.body.appendChild(r);
    setTimeout(() => r.remove(), 420);
}

let lastG = { x: GW/2, y: GH/2 };
const sc = document.getElementById("screen_container");
sc.addEventListener("touchstart", e => { e.preventDefault();
    const t = e.touches[0]; ripple(t.clientX, t.clientY);
    lastG = toGuest(t); setTouch(lastG.x, lastG.y, 1); }, {passive:false});
sc.addEventListener("touchmove",  e => { e.preventDefault();
    lastG = toGuest(e.touches[0]); setTouch(lastG.x, lastG.y, 1); }, {passive:false});
sc.addEventListener("touchend",   e => { e.preventDefault(); endTouch(lastG.x, lastG.y); }, {passive:false});
sc.addEventListener("mousedown",  e => { lastG = toGuest(e); setTouch(lastG.x, lastG.y, 1); });
sc.addEventListener("mousemove",  e => { if(e.buttons & 1){ lastG = toGuest(e); setTouch(lastG.x, lastG.y, 1); } });
sc.addEventListener("mouseup",    e => { const g = toGuest(e); endTouch(g.x, g.y); });

function fit(){
    const c = canvas(); if(!c) return;
    const s = Math.min(window.innerWidth/GW, window.innerHeight/GH);
    c.style.width  = (GW*s)+"px";
    c.style.height = (GH*s)+"px";
}
setInterval(fit, 400);
window.addEventListener("resize", fit);

/* trava zoom/scroll do navegador para o toque ser preciso */
document.addEventListener("gesturestart", e => e.preventDefault());
document.addEventListener("touchmove", e => e.preventDefault(), {passive:false});
let lastTouch = 0;
document.addEventListener("touchend", e => {
    const now = Date.now();
    if(now - lastTouch < 300) e.preventDefault();   /* impede double-tap zoom */
    lastTouch = now;
}, {passive:false});
</script>
</body>
</html>
